name: PM Hub Data Snapshot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build portfolio snapshot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ZD_AUTH: ${{ secrets.ZD_AUTH }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          const NOTION_TOKEN = process.env.NOTION_TOKEN;
          const ZD_AUTH      = process.env.ZD_AUTH || '';
          const ZD_BASE      = 'https://rev-io.zendesk.com/api/v2';

          const NOTION_HDR = {
            'Authorization': 'Bearer ' + NOTION_TOKEN,
            'Notion-Version': '2022-06-28',
            'Content-Type': 'application/json',
          };

          const DB_CLIENTS = '310a59b7-e7b2-806e-a78f-f37d70de8601';
          const DB_BRIEFS  = '344a59b7-e7b2-806b-a4b7-fce85ed24358';
          const DB_DIGESTS = '349a59b7-e7b2-80e8-a0c6-c0947c44f455';

          // ── Notion helpers ──────────────────────────────────────────────────
          async function notionQuery(dbId, filter, sorts) {
            let results = [], cursor;
            do {
              const body = { page_size: 100 };
              if (filter) body.filter = filter;
              if (sorts)  body.sorts  = sorts;
              if (cursor) body.start_cursor = cursor;
              const res = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
                method: 'POST', headers: NOTION_HDR, body: JSON.stringify(body),
              });
              const d = await res.json();
              if (!d.results) { console.error('Notion error:', JSON.stringify(d).slice(0,200)); break; }
              results.push(...d.results);
              cursor = d.has_more ? d.next_cursor : null;
            } while (cursor);
            return results;
          }

          function nStr(p)  { if (!p) return null; if (p.type==='title') return p.title?.map(t=>t.plain_text).join('')||null; if (p.type==='rich_text') return p.rich_text?.map(t=>t.plain_text).join('')||null; if (p.type==='select') return p.select?.name||null; return null; }
          function nDate(p) { return p?.date?.start || null; }
          function nNum(p)  { return p?.number ?? (p?.formula?.number ?? null); }
          function nPpl(p)  { return (p?.people||[]).map(x=>x.name).filter(Boolean); }
          function nStat(p) { return p?.status?.name || null; }

          function statusGroup(s) {
            if (!s) return 'other';
            const l = s.toLowerCase();
            if (l.includes('on track'))  return 'on-track';
            if (l.includes('off track')) return 'off-track';
            if (l==='rts')     return 'rts';
            if (l==='on hold') return 'on-hold';
            return 'other';
          }

          const STOP = new Set(['the','and','for','inc','llc','ltd','corp','co','group','company',
            'services','solutions','tech','technology','technologies','telecom','communications',
            'telephone','voip','systems','network','data','global','digital','cloud','psa','mig',
            'migration','internal','bob','north','south','east','west','public','comm',
            'rev','io','to','from','with','project','calls','call']);

          const BRIEF_ALIAS   = { 'Rhode Island Telephone': ['Rhode Island'], 'Public Telephone Company': ['PTCOA'] };
          const BRIEF_EXCLUDE = new Set(['805 Voip','Third Generation of Pennsylvania','PSA Mig to Internal']);

          function briefMatches(briefName, clientName) {
            const b = briefName.toLowerCase(), c = clientName.toLowerCase();
            if (b.includes(c) || c.includes(b)) return true;
            const tok = s => s.split(/[\s\-\/,().]+/).filter(t => t.length>=3 && !STOP.has(t));
            const cT = tok(c), bT = tok(b);
            if (!cT.length || !bT.length) return false;
            const [sh, lo] = cT.length<=bT.length ? [cT,bT] : [bT,cT];
            return sh.filter(st=>lo.some(lt=>lt.includes(st)||st.includes(lt))).length / sh.length >= 0.5;
          }

          // ── Zendesk helpers ─────────────────────────────────────────────────
          // Stop words for ZD keyword extraction — skip generic terms
          const ZD_STOP = new Set(['migration','to','rev','io','inc','llc','ltd','corp','co',
            'group','company','services','solutions','tech','technology','telecom','communications',
            'telephone','voip','systems','network','data','global','digital','cloud','psa','bob',
            'north','south','east','west','public','comm','partners','consulting','business','phone',
            'and','for','the','reseller','ky','dba']);

          function zdKeyword(name) {
            // First significant word (3+ chars, not a stop word)
            const words = name.toLowerCase().split(/[\s\-\/,().]+/);
            return words.find(w => w.length >= 3 && !ZD_STOP.has(w)) || words[0];
          }

          async function zdFetch(path) {
            if (!ZD_AUTH) return null;
            const url = path.startsWith('http') ? path : ZD_BASE + path;
            const res = await fetch(url, {
              headers: { 'Authorization': 'Basic ' + Buffer.from(ZD_AUTH).toString('base64') }
            });
            if (!res.ok) { console.error('ZD', res.status, path.slice(0,60)); return null; }
            return res.json();
          }

          async function fetchZdTicketsForClient(clientName) {
            if (!ZD_AUTH) return [];
            const kw = zdKeyword(clientName);
            // status<solved = open + pending + new + hold in one query, no OR needed
            const query = `type:ticket status<solved organization:${kw}`;
            const d = await zdFetch(`/search.json?query=${encodeURIComponent(query)}&per_page=50&sort_by=updated_at&sort_order=desc`);
            if (!d || !d.results) return [];
            return d.results
              .filter(t => ['open','pending','new','hold'].includes(t.status))
              .map(t => ({
                id:       t.id,
                subject:  t.subject,
                status:   t.status,
                url:      `https://rev-io.zendesk.com/agent/tickets/${t.id}`,
                updated:  t.updated_at?.slice(0,10) || '',
                created:  t.created_at?.slice(0,10) || '',
                priority: t.priority || null,
              }));
          }

          // ── Main ────────────────────────────────────────────────────────────
          (async () => {
            console.log('Fetching clients…');
            const EXCLUDED   = ['Graduated','Canceled','Completed'];
            const clientFilter = { and: EXCLUDED.map(s => ({ property:'Status', status:{ does_not_equal:s } })) };
            const clientPages = await notionQuery(DB_CLIENTS, clientFilter, [{ property:'Health Score', direction:'ascending' }]);
            console.log(`  ${clientPages.length} clients`);

            console.log('Fetching briefs (90d)…');
            const cutoff = new Date(Date.now()-90*86400000).toISOString().split('T')[0];
            const briefPages = await notionQuery(DB_BRIEFS,
              { property:'Call Date', date:{ on_or_after:cutoff } },
              [{ property:'Call Date', direction:'descending' }]
            );
            console.log(`  ${briefPages.length} briefs`);

            console.log('Fetching digests…');
            const digestPages = await notionQuery(DB_DIGESTS, null, [{ property:'Name', direction:'ascending' }]);
            console.log(`  ${digestPages.length} digests`);

            // Build client objects with full fields
            const clients = clientPages.map(page => {
              const pr = page.properties;
              const status  = nStat(pr['Status']);
              const wrikeId = nStr(pr['Wrike Project ID']);
              const koDate  = nDate(pr['Start/KO Date']);
              const gradDate = nDate(pr['Current Graduation Date']) || nDate(pr['Graduation Date']);
              return {
                id:             page.id,
                notionUrl:      `https://www.notion.so/${page.id.replace(/-/g,'')}`,
                name:           nStr(pr['Client Name']),
                status,
                statusGroup:    statusGroup(status),
                sa:             nPpl(pr['SA']),
                pm:             nPpl(pr['PM']),
                de:             nPpl(pr['DE']),
                csa:            nPpl(pr['CSA']),
                health:         nNum(pr['Health Score']),
                complexity:     nStr(pr['Complexity']),
                segment:        nStr(pr['Segment']),
                mrr:            nNum(pr['Activation MRR']),
                koDate,
                gradDate,
                activationDate: nDate(pr['Platform Activation Date']) || nDate(pr['Activation Date']),
                billOutDate:    nDate(pr['1st Bill Out Date']) || nDate(pr['Bill-Out Date']),
                charterDate:    nDate(pr['Charter Signed Date']),
                daysActive:     koDate ? Math.floor((Date.now()-new Date(koDate).getTime())/86400000) : null,
                wrikeId,
                wrikeUrl:       wrikeId ? `https://www.wrike.com/open.htm?id=${wrikeId}` : null,
              };
            });

            // Index briefs
            const allBriefs = briefPages.map(page => {
              const pr = page.properties;
              return {
                id:            page.id,
                title:         nStr(pr['Name']),
                date:          nDate(pr['Call Date']),
                callType:      nStr(pr['Call Type']),
                risk:          nStr(pr['Risk Level']),
                ownerRole:     nStr(pr['Owner Role']),
                owner:         nStr(pr['Owner']),
                duration:      nNum(pr['Duration (min)']),
                keyTakeaways:  nStr(pr['Key Takeaways']),
                actionItems:   nStr(pr['Action Items']),
                blockers:      nStr(pr['Blockers']),
                openQuestions: nStr(pr['Open Questions']),
                redFlags:      nStr(pr['Red Flags']),
                configTopics:  nStr(pr['Config Topics']),
                riskReason:    nStr(pr['Risk Reason']),
              };
            });

            // Match briefs to clients
            const briefsByClientId = {};
            for (const client of clients) {
              if (!client.name) continue;
              const aliases = BRIEF_ALIAS[client.name];
              briefsByClientId[client.id] = allBriefs.filter(b => {
                if (!b.title) return false;
                if (BRIEF_EXCLUDE.has(client.name)) return false;
                if (aliases) return aliases.some(a => b.title.toLowerCase().includes(a.toLowerCase()) || a.toLowerCase().includes(b.title.toLowerCase()));
                return briefMatches(b.title, client.name);
              });
            }

            // Attach lastCall to each client
            for (const c of clients) {
              const cb = briefsByClientId[c.id];
              c.lastCall = cb?.length ? { date: cb[0].date, risk: cb[0].risk } : null;
            }

            // Match digest to each client and fetch block content
            async function fetchDigestBlocks(pageId) {
              const res = await fetch(`https://api.notion.com/v1/blocks/${pageId}/children?page_size=100`, {
                headers: NOTION_HDR
              });
              const d = await res.json();
              return d.results || [];
            }

            function parseDigestBlocks(blocks) {
              const sections = {};
              let curSection = '_top';
              for (const b of blocks) {
                const type = b.type;
                const txt = (b[type]?.rich_text || b[type]?.text || []).map(t=>t.plain_text).join('').trim();
                if (!txt) continue;
                if (type === 'heading_2' || type === 'heading_3') {
                  curSection = txt.replace(/^[^a-zA-Z]+/, '').trim().toLowerCase();
                  sections[curSection] = sections[curSection] || [];
                } else if (type === 'callout' || type === 'paragraph') {
                  sections[curSection] = sections[curSection] || [];
                  sections[curSection].push(txt);
                } else if (type === 'bulleted_list_item' || type === 'numbered_list_item') {
                  sections[curSection] = sections[curSection] || [];
                  sections[curSection].push(txt);
                }
              }
              // Extract health from callout
              let health = null, healthLabel = null, statusLine = null;
              const topBlocks = sections['_top'] || [];
              for (const line of topBlocks) {
                if (!statusLine) statusLine = line;
                const hm = line.match(/(\d+)\/100/);
                if (hm) { health = parseInt(hm[1]); }
                const lm = line.match(/(Healthy|Watching|At Risk|Critical)/i);
                if (lm) healthLabel = lm[1];
              }
              return {
                statusLine: statusLine || '',
                health, healthLabel,
                team:        sections['team'] || sections['👥 team'] || [],
                timeline:    sections['timeline'] || sections['📅 timeline'] || [],
                mrr:         sections['mrr'] || sections['💰 mrr'] || [],
                recentCalls: sections['recent calls (7d)'] || sections['recent calls'] || [],
                zdTickets:   sections['zendesk tickets'] || sections['zendesk'] || [],
                teamsNotes:  sections['teams notes'] || sections['teams'] || [],
                raw: sections,
              };
            }

            const digestsByClientId = {};
            for (const client of clients) {
              if (!client.name) continue;
              const firstWord = client.name.split(/\s+/)[0].toLowerCase();
              const match = digestPages.filter(p => (nStr(p.properties['Name'])||'').toLowerCase().includes(firstWord));
              if (!match.length) continue;
              const page = match[match.length-1];
              try {
                const blocks = await fetchDigestBlocks(page.id);
                const parsed = parseDigestBlocks(blocks);
                digestsByClientId[client.id] = {
                  id:   page.id,
                  name: nStr(page.properties['Name']),
                  ...parsed,
                };
              } catch(e) {
                digestsByClientId[client.id] = { id: page.id, name: nStr(page.properties['Name']) };
              }
            }
            console.log(`  Digests fetched: ${Object.keys(digestsByClientId).length}`);

            // Zendesk — search by client keyword directly (no org-list pagination issues)
            console.log('Fetching Zendesk tickets…');
            const ticketsByClientId = {};
            if (ZD_AUTH) {
              for (const client of clients) {
                if (!client.name) continue;
                const ts = await fetchZdTicketsForClient(client.name);
                if (ts.length) {
                  ticketsByClientId[client.id] = ts;
                  console.log(`  ${client.name}: ${ts.length} tickets (kw: ${zdKeyword(client.name)})`);
                }
              }
              const total = Object.values(ticketsByClientId).reduce((s,a)=>s+a.length,0);
              console.log(`  Total: ${Object.keys(ticketsByClientId).length} clients, ${total} tickets`);
            }

            const snapshot = {
              updatedAt: new Date().toISOString(),
              clients,
              briefsByClientId,
              digestsByClientId,
              ticketsByClientId,
            };

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/portfolio.json', JSON.stringify(snapshot));
            console.log('Snapshot written:', JSON.stringify(snapshot).length, 'bytes');
          })();
          SCRIPT

      - name: Commit snapshot
        run: |
          git config user.name  "Alfred"
          git config user.email "alfred@rev.io"
          git add data/portfolio.json
          git diff --cached --quiet && echo "No changes" || git commit -m "PM Hub snapshot $(date -u +%H:%MZ)"
          git push
