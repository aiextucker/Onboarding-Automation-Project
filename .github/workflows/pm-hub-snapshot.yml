name: PM Hub Data Snapshot

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build portfolio snapshot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          const TOKEN   = process.env.NOTION_TOKEN;
          const HEADERS = {
            'Authorization': 'Bearer ' + TOKEN,
            'Notion-Version': '2022-06-28',
            'Content-Type':  'application/json',
          };

          const DB_CLIENTS = '310a59b7-e7b2-806e-a78f-f37d70de8601';
          const DB_BRIEFS  = '344a59b7-e7b2-806b-a4b7-fce85ed24358';
          const DB_DIGESTS = '349a59b7-e7b2-80e8-a0c6-c0947c44f455';

          async function queryAll(dbId, filter, sorts) {
            let results = [], cursor;
            do {
              const body = { page_size: 100 };
              if (filter) body.filter = filter;
              if (sorts)  body.sorts  = sorts;
              if (cursor) body.start_cursor = cursor;
              const res = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
                method: 'POST', headers: HEADERS, body: JSON.stringify(body),
              });
              const d = await res.json();
              if (!d.results) { console.error('Notion error:', JSON.stringify(d)); break; }
              results.push(...d.results);
              cursor = d.has_more ? d.next_cursor : null;
            } while (cursor);
            return results;
          }

          function nStr(prop) {
            if (!prop) return null;
            if (prop.type === 'title')     return prop.title?.map(t => t.plain_text).join('') || null;
            if (prop.type === 'rich_text') return prop.rich_text?.map(t => t.plain_text).join('') || null;
            if (prop.type === 'select')    return prop.select?.name || null;
            return null;
          }
          function nDate(prop)  { return prop?.date?.start || null; }
          function nNum(prop)   { return prop?.number ?? (prop?.formula?.number ?? null); }
          function nPpl(prop)   { return (prop?.people || []).map(p => p.name).filter(Boolean); }
          function nStat(prop)  { return prop?.status?.name || null; }

          function statusGroup(s) {
            if (!s) return 'other';
            const l = s.toLowerCase();
            if (l.includes('on track'))  return 'on-track';
            if (l.includes('off track')) return 'off-track';
            if (l === 'rts')     return 'rts';
            if (l === 'on hold') return 'on-hold';
            return 'other';
          }

          const STOP = new Set(['the','and','for','inc','llc','ltd','corp','co','group','company',
            'services','solutions','tech','technology','technologies','telecom','communications',
            'telephone','voip','systems','network','data','global','digital','cloud','psa','mig',
            'migration','internal','bob','north','south','east','west','public','comm']);

          function tokenize(name) {
            return name.toLowerCase().split(/[\s\-\/,().]+/).filter(t => t.length >= 2 && !STOP.has(t));
          }

          const BRIEF_ALIAS = {
            'Rhode Island Telephone': ['Rhode Island'],
            'Public Telephone Company': ['PTCOA'],
          };
          const BRIEF_EXCLUDE = new Set(['805 Voip','Third Generation of Pennsylvania','PSA Mig to Internal']);

          function briefMatches(briefName, clientName) {
            const b = briefName.toLowerCase(), c = clientName.toLowerCase();
            if (b.includes(c) || c.includes(b)) return true;
            const cToks = tokenize(clientName), bToks = tokenize(briefName);
            if (!cToks.length || !bToks.length) return false;
            const shorter = cToks.length <= bToks.length ? cToks : bToks;
            const longer  = cToks.length <= bToks.length ? bToks  : cToks;
            const matched = shorter.filter(st => longer.some(lt => lt.includes(st) || st.includes(lt)));
            return matched.length / shorter.length >= 0.5;
          }

          (async () => {
            console.log('Fetching clients...');
            const EXCLUDED = ['Graduated','Canceled','Completed'];
            const clientFilter = { and: EXCLUDED.map(s => ({ property: 'Status', status: { does_not_equal: s } })) };
            const clientPages = await queryAll(DB_CLIENTS, clientFilter, [{ property: 'Health Score', direction: 'ascending' }]);
            console.log(`  ${clientPages.length} clients`);

            console.log('Fetching briefs (90d)...');
            const cutoff = new Date(Date.now() - 90 * 86400000).toISOString().split('T')[0];
            const briefPages = await queryAll(DB_BRIEFS,
              { property: 'Call Date', date: { on_or_after: cutoff } },
              [{ property: 'Call Date', direction: 'descending' }]
            );
            console.log(`  ${briefPages.length} briefs`);

            console.log('Fetching digests...');
            const digestPages = await queryAll(DB_DIGESTS, null, [{ property: 'Name', direction: 'ascending' }]);
            console.log(`  ${digestPages.length} digests`);

            // Build clients array
            const clients = clientPages.map(page => {
              const pr = page.properties;
              const status = nStat(pr['Status']);
              const koDate   = nDate(pr['Start/KO Date']);
              const gradDate = nDate(pr['Current Graduation Date']) || nDate(pr['Graduation Date']);
              const daysActive = koDate
                ? Math.floor((Date.now() - new Date(koDate).getTime()) / 86400000)
                : null;
              return {
                id:          page.id,
                name:        nStr(pr['Client Name']),
                status,
                statusGroup: statusGroup(status),
                sa:          nPpl(pr['SA']),
                pm:          nPpl(pr['PM']),
                de:          nPpl(pr['DE']),
                health:      nNum(pr['Health Score']),
                complexity:  nStr(pr['Complexity']),
                segment:     nStr(pr['Segment']),
                mrr:         nNum(pr['Activation MRR']),
                koDate,
                gradDate,
                daysActive,
              };
            });

            // Index briefs by notion page id → for later per-client lookups
            const briefsByPageId = {};
            for (const page of briefPages) {
              const pr = page.properties;
              const brief = {
                id:            page.id,
                title:         nStr(pr['Name']),
                date:          nDate(pr['Call Date']),
                callType:      nStr(pr['Call Type']),
                risk:          nStr(pr['Risk Level']),
                ownerRole:     nStr(pr['Owner Role']),
                owner:         nStr(pr['Owner']),
                duration:      nNum(pr['Duration (min)']),
                keyTakeaways:  nStr(pr['Key Takeaways']),
                actionItems:   nStr(pr['Action Items']),
                blockers:      nStr(pr['Blockers']),
                openQuestions: nStr(pr['Open Questions']),
                redFlags:      nStr(pr['Red Flags']),
                configTopics:  nStr(pr['Config Topics']),
                riskReason:    nStr(pr['Risk Reason']),
              };
              briefsByPageId[page.id] = brief;
            }

            // Match briefs to clients
            const briefsByClientId = {};
            for (const client of clients) {
              if (!client.name) continue;
              const aliases = BRIEF_ALIAS[client.name];
              const matched = briefPages.filter(p => {
                const bn = nStr(p.properties['Name']) || '';
                if (BRIEF_EXCLUDE.has(client.name)) return false;
                if (aliases) return aliases.some(a => bn.toLowerCase().includes(a.toLowerCase()) || a.toLowerCase().includes(bn.toLowerCase()));
                return briefMatches(bn, client.name);
              });
              briefsByClientId[client.id] = matched.map(p => briefsByPageId[p.id]).filter(Boolean);
            }

            // Match latest call per client for the list view
            for (const client of clients) {
              const clientBriefs = briefsByClientId[client.id] || [];
              if (clientBriefs.length > 0) {
                client.lastCall = { date: clientBriefs[0].date, risk: clientBriefs[0].risk };
              } else {
                client.lastCall = null;
              }
            }

            // Index digests by client name (first word match)
            const digestsByClientId = {};
            for (const client of clients) {
              if (!client.name) continue;
              const firstWord = client.name.split(/\s+/)[0].toLowerCase();
              const match = digestPages.filter(p => {
                const dn = (nStr(p.properties['Name']) || '').toLowerCase();
                return dn.includes(firstWord);
              });
              if (match.length > 0) {
                const last = match[match.length - 1];
                digestsByClientId[client.id] = {
                  id:   last.id,
                  name: nStr(last.properties['Name']),
                };
              }
            }

            const snapshot = {
              updatedAt:        new Date().toISOString(),
              clients,
              briefsByClientId,
              digestsByClientId,
            };

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/portfolio.json', JSON.stringify(snapshot));
            console.log('Snapshot written:', JSON.stringify(snapshot).length, 'bytes');
          })();
          SCRIPT

      - name: Commit snapshot
        run: |
          git config user.name  "Alfred"
          git config user.email "alfred@rev.io"
          git add data/portfolio.json
          git diff --cached --quiet && echo "No changes" || git commit -m "PM Hub snapshot $(date -u +%H:%MZ)"
          git push
