name: Handle Questionnaire Approval

on:
  push:
    branches: []
  repository_dispatch:
    types: [questionnaire-approved, questionnaire-changes-requested]

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Update Notion and notify team
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
          MS_ALEX_CHAT_ID: ${{ secrets.MS_ALEX_CHAT_ID }}
          MS_GROUP_CHAT_ID: 19:2a62f0ac76cf44eaaf7f8f84f5a3c119@thread.v2
          EVENT_TYPE: ${{ github.event.action }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node << 'SCRIPT'
          (async () => {
            const payload     = JSON.parse(process.env.PAYLOAD);
            const eventType   = process.env.EVENT_TYPE;
            const isApproval  = eventType === 'questionnaire-approved';
            const { submissionId, clientName, notionPageId, approvedAt, answers } = payload;

            console.log('[start]', eventType, '/', submissionId, '/', clientName);

            // ── Notion update ────────────────────────────────────────────────
            const notionToken = process.env.NOTION_TOKEN;
            async function notionReq(method, endpoint, body) {
              const res = await fetch('https://api.notion.com/v1' + endpoint, {
                method,
                headers: {
                  'Authorization': 'Bearer ' + notionToken,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
                },
                body: body ? JSON.stringify(body) : undefined,
              });
              const data = await res.json();
              if (!res.ok || data.object === 'error') throw new Error('Notion ' + res.status + ': ' + (data.message || JSON.stringify(data)));
              return data;
            }

            if (notionPageId) {
              await notionReq('PATCH', '/pages/' + notionPageId, {
                properties: {
                  'Status': { select: { name: isApproval ? 'Approved' : 'Changes Requested' } }
                }
              });
              console.log('[notion] Status updated to', isApproval ? 'Approved' : 'Changes Requested');
            }

            // ── Teams token ──────────────────────────────────────────────────
            const tokenRes = await fetch(
              `https://login.microsoftonline.com/${process.env.MS_TENANT_ID}/oauth2/v2.0/token`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                  grant_type:    'refresh_token',
                  client_id:     process.env.MS_CLIENT_ID,
                  refresh_token: process.env.MS_REFRESH_TOKEN,
                  scope:         'https://graph.microsoft.com/.default offline_access',
                }),
              }
            );
            const tokenData = await tokenRes.json();
            if (tokenData.error) throw new Error('Teams auth: ' + tokenData.error_description);

            // ── Build confirmation message ───────────────────────────────────
            const when = new Date(approvedAt).toLocaleString('en-US', { timeZone: 'America/New_York', dateStyle: 'medium', timeStyle: 'short' });
            const msg = isApproval
              ? `✅ <b>PSA Config Approved — ${clientName}</b><br><br>`
                + `Configuration has been approved and Alfred will begin setting up the PSA instance.<br><br>`
                + `<b>Approved:</b> ${when} ET<br>`
                + `<b>Submission ID:</b> <code>${submissionId}</code>`
              : `💬 <b>Changes Requested — ${clientName}</b><br><br>`
                + `The SA team has requested changes before configuration proceeds.<br><br>`
                + `<b>Requested:</b> ${when} ET<br>`
                + `<b>Submission ID:</b> <code>${submissionId}</code>`;

            const chatIds = [
              process.env.MS_ALEX_CHAT_ID,
              process.env.MS_GROUP_CHAT_ID,
            ].filter(Boolean);

            for (const cid of chatIds) {
              const r = await fetch(
                `https://graph.microsoft.com/v1.0/chats/${cid}/messages`,
                {
                  method: 'POST',
                  headers: { 'Authorization': 'Bearer ' + tokenData.access_token, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ body: { contentType: 'html', content: msg } }),
                }
              );
              if (!r.ok) { const t = await r.text(); throw new Error('Teams failed (' + cid + '): ' + r.status + ' ' + t); }
              console.log('[teams] Confirmation sent to', cid);
            }

            console.log('[done]', submissionId);
          })().catch(err => { console.error('[error]', err.message); process.exit(1); });
          SCRIPT
