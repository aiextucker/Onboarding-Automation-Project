              }
            );
            const tokenData = await tokenRes.json();
            if (tokenData.error) throw new Error('Teams auth failed: ' + tokenData.error_description);

            // ── Build rich summary strings ───────────────────────────────────
            const a = answers;

            const cycleLabel   = a.billingCycle === 'cycle'       ? 'Cycle-based'
                               : a.billingCycle === 'anniversary' ? 'Anniversary date' : '⚠️ Not set';
            const datesLabel   = (a.cycleDates && a.cycleDates.length) ? a.cycleDates.join(' & ') : '⚠️ Not set';
            const arrearsLabel = a.arrears === 'yes' ? 'Yes — after service period'
                               : a.arrears === 'no'  ? 'No — bill in advance' : '⚠️ Not set';
            const multiLabel   = a.multiProfile === 'yes' ? 'Yes' : a.multiProfile === 'no' ? 'No' : '⚠️ Not set';

            let lateFeeLine = 'None';
            if (a.lateFees === 'yes') {
              const amt = a.lateFeeType === 'percent' ? (a.lateFeeAmount||'?') + '%' : '$' + (a.lateFeeAmount||'?');
              lateFeeLine = amt + (a.gracePeriod === 'yes' ? ` (${a.graceDays||'?'}-day grace)` : ', no grace');
            }

            const invLabel = a.inventory === 'yes' ? 'Yes' : a.inventory === 'none' ? 'No' : '⚠️ Not set';

            const users = a.users || [];
            const userLines = users.length
              ? users.map(u => `• ${u.name||'(unnamed)'} — ${u.email||'⚠️ no email'} [${u.role||'Unknown role'}]`).join('\n')
              : '⚠️ No users submitted';

            const submittedET = new Date(submittedAt).toLocaleString('en-US', {
              timeZone: 'America/New_York', dateStyle: 'medium', timeStyle: 'short'
            });

            // ── Build Adaptive Card ──────────────────────────────────────────
            const card = {
              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "type": "AdaptiveCard",
              "version": "1.4",
              "body": [
                {
                  "type": "TextBlock",
                  "text": `✅ Questionnaire Submitted — ${clientName}`,
                  "weight": "Bolder",
                  "size": "Large",
                  "wrap": true,
                  "color": "Good"
                },
                {
                  "type": "FactSet",
                  "facts": [
                    { "title": "Contact",   "value": `${a.contact||'—'} · ${a.email||'—'}` },
                    { "title": "Submitted", "value": submittedET + " ET" },
                    { "title": "ID",        "value": submissionId },
                  ]
                },
                { "type": "TextBlock", "text": "💳 Billing Config", "weight": "Bolder", "spacing": "Medium" },
                {
                  "type": "FactSet",
                  "facts": [
                    { "title": "Cycle type",        "value": cycleLabel },
                    { "title": "Cycle date(s)",      "value": datesLabel },
                    { "title": "Bill in arrears",    "value": arrearsLabel },
                    { "title": "Multiple profiles",  "value": multiLabel },
                    { "title": "Late fees",          "value": lateFeeLine },
                  ]
                },
                { "type": "TextBlock", "text": "📦 Inventory Tracking", "weight": "Bolder", "spacing": "Medium" },
                { "type": "TextBlock", "text": invLabel, "wrap": true },
                { "type": "TextBlock", "text": `👥 Users (${users.length})`, "weight": "Bolder", "spacing": "Medium" },
                { "type": "TextBlock", "text": userLines || "⚠️ None", "wrap": true, "fontType": "Monospace", "size": "Small" },
              ],
              "actions": [
                {
                  "type": "Action.OpenUrl",
                  "title": "✅ Review & Approve",
                  "url": approveUrl,
                  "style": "positive"
                },
                {
                  "type": "Action.OpenUrl",
                  "title": "📋 View in Notion",
                  "url": notionUrl
                }
              ]
            };

            // ── Send Adaptive Card to both chats ─────────────────────────────
            const chatIds = [
              process.env.MS_ALEX_CHAT_ID,
            ].filter(Boolean);

            const attachId = 'q-' + Date.now().toString(36);
            for (const cid of chatIds) {
              const r = await fetch(
                `https://graph.microsoft.com/v1.0/chats/${cid}/messages`,
                {
                  method: 'POST',
                  headers: { 'Authorization': 'Bearer ' + tokenData.access_token, 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    body: { contentType: 'html', content: `<attachment id="${attachId}"></attachment>` },
                    attachments: [{
                      id: attachId,
                      contentType: 'application/vnd.microsoft.card.adaptive',
                      contentUrl: null,
                      content: JSON.stringify(card),
                    }]
                  }),
                }
              );
              if (!r.ok) { const t = await r.text(); throw new Error(`Teams failed (${cid}): ${r.status} ${t}`); }
              console.log('[teams] Card sent to', cid);
            }


            // ── Send confirmation email to client ────────────────────────────
            const clientEmail = answers.email;
            if (clientEmail) {
              const a = answers;
              const users = a.users || [];

              const cycleLabel   = a.billingCycle === 'cycle'       ? 'Cycle-based'
                                 : a.billingCycle === 'anniversary' ? 'Anniversary date' : 'Not set';
              const datesLabel   = (a.cycleDates && a.cycleDates.length) ? a.cycleDates.join(' & ') : '—';
              const arrearsLabel = a.arrears === 'yes' ? 'Yes — bill after service period'
                                 : a.arrears === 'no'  ? 'No — bill in advance' : 'Not set';
              const multiLabel   = a.multiProfile === 'yes' ? 'Yes' : a.multiProfile === 'no' ? 'No' : 'Not set';
              const invLabel     = a.inventory === 'yes' ? 'Yes' : a.inventory === 'none' ? 'No' : 'Not set';

              let feesLabel = 'None';
              if (a.lateFees === 'yes') {
                const amt = a.lateFeeType === 'percent' ? (a.lateFeeAmount||'?') + '%' : '
            await notionReq('PATCH', '/pages/' + page.id, {
