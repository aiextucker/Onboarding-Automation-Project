name: Handle Questionnaire Submission

on:
  repository_dispatch:
    types: [questionnaire-submitted]

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Write to Notion and notify SA
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
          MS_ALEX_CHAT_ID: ${{ secrets.MS_ALEX_CHAT_ID }}
          MS_GROUP_CHAT_ID: 19:2a62f0ac76cf44eaaf7f8f84f5a3c119@thread.v2
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node << 'SCRIPT'
          (async () => {
            const payload = JSON.parse(process.env.PAYLOAD);
            const { submissionId, clientName, submittedAt, answers } = payload;

            console.log('[start] Processing submission:', submissionId, '/', clientName);

            // ── Notion helpers ───────────────────────────────────────────────
            const notionToken = process.env.NOTION_TOKEN;
            const notionDbId  = process.env.NOTION_DB_ID || '350a59b7-e7b2-8145-aca9-d536b00c13a3';

            async function notionReq(method, endpoint, body) {
              const res = await fetch('https://api.notion.com/v1' + endpoint, {
                method,
                headers: {
                  'Authorization': 'Bearer ' + notionToken,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
                },
                body: body ? JSON.stringify(body) : undefined,
              });
              const data = await res.json();
              if (!res.ok || data.object === 'error') {
                throw new Error('Notion error ' + res.status + ': ' + (data.message || JSON.stringify(data)));
              }
              return data;
            }

            // ── Write submission to Notion ───────────────────────────────────
            const submittedDataStr = JSON.stringify(answers);
            const truncated = submittedDataStr.length > 1900
              ? submittedDataStr.substring(0, 1900) + '…'
              : submittedDataStr;

            const page = await notionReq('POST', '/pages', {
              parent: { database_id: notionDbId },
              properties: {
                'Token':          { title: [{ text: { content: submissionId } }] },
                'Client Name':    { rich_text: [{ text: { content: clientName || '' } }] },
                'Client Email':   { email: answers.email || null },
                'Status':         { select: { name: 'Submitted' } },
                'Submitted Data': { rich_text: [{ text: { content: truncated } }] },
                'Submitted At':   { date: { start: submittedAt || new Date().toISOString() } },
                'SA Notified':    { checkbox: false },
              }
            });
            console.log('[notion] Submission recorded, page id:', page.id);

            const notionUrl  = 'https://notion.so/' + page.id.replace(/-/g, '');
            const encodedAnswers = Buffer.from(unescape(encodeURIComponent(JSON.stringify(answers)))).toString('base64');
            const approveUrl = 'https://aiextucker.github.io/Onboarding-Automation-Project/approve.html'
              + '?id='     + encodeURIComponent(submissionId)
              + '&page='   + encodeURIComponent(page.id)
              + '&client=' + encodeURIComponent(clientName || '')
              + '&data='   + encodeURIComponent(encodedAnswers);

            // ── Get Teams access token ───────────────────────────────────────
            const tenantId     = process.env.MS_TENANT_ID;
            const clientId     = process.env.MS_CLIENT_ID;
            const refreshToken = process.env.MS_REFRESH_TOKEN;

            const tokenRes = await fetch(
              `https://login.microsoftonline.com/${tenantId}/oauth2/v2.0/token`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                  grant_type:    'refresh_token',
                  client_id:     clientId,
                  refresh_token: refreshToken,
                  scope:         'https://graph.microsoft.com/.default offline_access',
                }),
              }
            );
            const tokenData = await tokenRes.json();
            if (tokenData.error) throw new Error('Teams auth failed: ' + tokenData.error_description);

            // ── Build rich summary strings ───────────────────────────────────
            const a = answers;

            const cycleLabel   = a.billingCycle === 'cycle'       ? 'Cycle-based'
                               : a.billingCycle === 'anniversary' ? 'Anniversary date' : '⚠️ Not set';
            const datesLabel   = (a.cycleDates && a.cycleDates.length) ? a.cycleDates.join(' & ') : '⚠️ Not set';
            const arrearsLabel = a.arrears === 'yes' ? 'Yes — after service period'
                               : a.arrears === 'no'  ? 'No — bill in advance' : '⚠️ Not set';
            const multiLabel   = a.multiProfile === 'yes' ? 'Yes' : a.multiProfile === 'no' ? 'No' : '⚠️ Not set';

            let lateFeeLine = 'None';
            if (a.lateFees === 'yes') {
              const amt = a.lateFeeType === 'percent' ? (a.lateFeeAmount||'?') + '%' : '$' + (a.lateFeeAmount||'?');
              lateFeeLine = amt + (a.gracePeriod === 'yes' ? ` (${a.graceDays||'?'}-day grace)` : ', no grace');
            }

            const invLabel = a.inventory === 'yes' ? 'Yes' : a.inventory === 'none' ? 'No' : '⚠️ Not set';

            const users = a.users || [];
            const userLines = users.length
              ? users.map(u => `• ${u.name||'(unnamed)'} — ${u.email||'⚠️ no email'} [${u.role||'Unknown role'}]`).join('\n')
              : '⚠️ No users submitted';

            const submittedET = new Date(submittedAt).toLocaleString('en-US', {
              timeZone: 'America/New_York', dateStyle: 'medium', timeStyle: 'short'
            });

            // ── Build Adaptive Card ──────────────────────────────────────────
            const card = {
              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "type": "AdaptiveCard",
              "version": "1.4",
              "body": [
                {
                  "type": "TextBlock",
                  "text": `✅ Questionnaire Submitted — ${clientName}`,
                  "weight": "Bolder",
                  "size": "Large",
                  "wrap": true,
                  "color": "Good"
                },
                {
                  "type": "FactSet",
                  "facts": [
                    { "title": "Contact",   "value": `${a.contact||'—'} · ${a.email||'—'}` },
                    { "title": "Submitted", "value": submittedET + " ET" },
                    { "title": "ID",        "value": submissionId },
                  ]
                },
                { "type": "TextBlock", "text": "💳 Billing Config", "weight": "Bolder", "spacing": "Medium" },
                {
                  "type": "FactSet",
                  "facts": [
                    { "title": "Cycle type",        "value": cycleLabel },
                    { "title": "Cycle date(s)",      "value": datesLabel },
                    { "title": "Bill in arrears",    "value": arrearsLabel },
                    { "title": "Multiple profiles",  "value": multiLabel },
                    { "title": "Late fees",          "value": lateFeeLine },
                  ]
                },
                { "type": "TextBlock", "text": "📦 Inventory Tracking", "weight": "Bolder", "spacing": "Medium" },
                { "type": "TextBlock", "text": invLabel, "wrap": true },
                { "type": "TextBlock", "text": `👥 Users (${users.length})`, "weight": "Bolder", "spacing": "Medium" },
                { "type": "TextBlock", "text": userLines || "⚠️ None", "wrap": true, "fontType": "Monospace", "size": "Small" },
              ],
              "actions": [
                {
                  "type": "Action.OpenUrl",
                  "title": "✅ Review & Approve",
                  "url": approveUrl,
                  "style": "positive"
                },
                {
                  "type": "Action.OpenUrl",
                  "title": "📋 View in Notion",
                  "url": notionUrl
                }
              ]
            };

            // ── Send Adaptive Card to both chats ─────────────────────────────
            const chatIds = [
              process.env.MS_ALEX_CHAT_ID,
              process.env.MS_GROUP_CHAT_ID,
            ].filter(Boolean);

            const attachId = 'q-' + Date.now().toString(36);
            for (const cid of chatIds) {
              const r = await fetch(
                `https://graph.microsoft.com/v1.0/chats/${cid}/messages`,
                {
                  method: 'POST',
                  headers: { 'Authorization': 'Bearer ' + tokenData.access_token, 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    body: { contentType: 'html', content: `<attachment id="${attachId}"></attachment>` },
                    attachments: [{
                      id: attachId,
                      contentType: 'application/vnd.microsoft.card.adaptive',
                      contentUrl: null,
                      content: JSON.stringify(card),
                    }]
                  }),
                }
              );
              if (!r.ok) { const t = await r.text(); throw new Error(`Teams failed (${cid}): ${r.status} ${t}`); }
              console.log('[teams] Card sent to', cid);
            }

            // ── Mark SA Notified in Notion ───────────────────────────────────
            await notionReq('PATCH', '/pages/' + page.id, {
              properties: { 'SA Notified': { checkbox: true } }
            });

            console.log('[done] All steps complete for', submissionId);
          })().catch(err => { console.error('[error]', err.message); process.exit(1); });
          SCRIPT
