<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Hub — Rev.io Onboarding</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --surface:   #181c27;
  --surface2:  #1e2436;
  --surface3:  #242840;
  --border:    #2a3050;
  --border-hi: #3d4870;
  --accent:    #6c63ff;
  --accent-dk: #5549e0;
  --accent-lt: #8b84ff;
  --teal:      #00d4aa;
  --teal-dk:   #00b090;
  --text:      #e8e8f0;
  --text-dim:  #8a90b0;
  --text-mute: #525870;
  --red:       #ff5a6e;
  --red-bg:    rgba(255,90,110,0.1);
  --yellow:    #f0a500;
  --yellow-bg: rgba(240,165,0,0.1);
  --green:     #00d4aa;
  --green-bg:  rgba(0,212,170,0.1);
  --blue:      #4fa3ff;
  --blue-bg:   rgba(79,163,255,0.1);
  --purple:    #a78bfa;
  --purple-bg: rgba(167,139,250,0.1);
  --orange:    #fb923c;
  --orange-bg: rgba(251,146,60,0.1);
  --radius:    10px;
  --radius-sm: 6px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

html { font-size: 15px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── Header ── */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; }
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.78rem; color: #fff;
}
.logo-sub { font-size: 0.72rem; color: var(--text-mute); font-weight: 400; margin-left: 2px; }
.header-links { display: flex; gap: 6px; }
.header-link {
  color: var(--text-dim); text-decoration: none; font-size: 0.8rem;
  padding: 4px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); transition: all .15s;
}
.header-link:hover { color: var(--text); border-color: var(--border-hi); }
.header-link.active { color: var(--accent); border-color: var(--accent); }

/* ── Search bar ── */
.search-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 260px;
  max-width: 480px;
}
.search-wrap .icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-mute); pointer-events: none; font-size: 1rem;
}
#clientSearch {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px 8px 34px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  outline: none;
  transition: border-color .15s;
}
#clientSearch:focus { border-color: var(--accent); }
.autocomplete-list {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface2);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius-sm);
  max-height: 280px;
  overflow-y: auto;
  z-index: 200;
  display: none;
}
.autocomplete-list.open { display: block; }
.ac-item {
  padding: 9px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.88rem;
  transition: background .1s;
}
.ac-item:hover, .ac-item.selected { background: var(--surface3); }
.ac-item .ac-name { font-weight: 500; flex: 1; }
.ac-item .ac-meta { font-size: 0.75rem; color: var(--text-mute); }
.days-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
}
.days-select:focus { border-color: var(--accent); }
.refresh-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.82rem;
  transition: all .15s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.updated-at { font-size: 0.75rem; color: var(--text-mute); }

/* ── Main layout ── */
.main { padding: 24px; max-width: 1100px; margin: 0 auto; }

/* ── Empty / loading states ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-mute);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state h2 { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 6px; }
.empty-state p { font-size: 0.85rem; max-width: 360px; margin: 0 auto; }

.loading { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Client header card ── */
.client-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.client-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
.client-meta-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-top: 8px; }
.meta-item { display: flex; align-items: center; gap: 5px; font-size: 0.82rem; color: var(--text-dim); }
.meta-item strong { color: var(--text); }
.client-stats { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
.stat-pill {
  text-align: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  min-width: 90px;
}
.stat-pill .val { font-size: 1.4rem; font-weight: 700; line-height: 1; }
.stat-pill .lbl { font-size: 0.7rem; color: var(--text-mute); margin-top: 3px; text-transform: uppercase; letter-spacing: .05em; }
.stat-pill.health-low .val  { color: var(--red); }
.stat-pill.health-mid .val  { color: var(--yellow); }
.stat-pill.health-high .val { color: var(--green); }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center;
  font-size: 0.72rem; font-weight: 600;
  padding: 2px 9px; border-radius: 20px;
  letter-spacing: .03em; white-space: nowrap;
}
.badge.risk-high   { background: var(--red-bg);    color: var(--red); }
.badge.risk-medium { background: var(--yellow-bg); color: var(--yellow); }
.badge.risk-low    { background: var(--green-bg);  color: var(--green); }
.badge.risk-unknown{ background: var(--surface3);  color: var(--text-mute); }
.badge.type-kickoff    { background: var(--purple-bg); color: var(--purple); }
.badge.type-config     { background: var(--blue-bg);   color: var(--blue); }
.badge.type-training   { background: var(--teal-bg, rgba(0,212,170,.1)); color: var(--teal); }
.badge.type-support    { background: var(--orange-bg); color: var(--orange); }
.badge.type-other      { background: var(--surface3);  color: var(--text-dim); }
.badge.type-demo       { background: var(--purple-bg); color: var(--purple); }
.badge.role-SA  { background: var(--blue-bg);   color: var(--blue); }
.badge.role-PM  { background: var(--purple-bg); color: var(--purple); }
.badge.role-DE  { background: var(--orange-bg); color: var(--orange); }
.badge.role-CS  { background: var(--green-bg);  color: var(--green); }

.status-dot {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.8rem; font-weight: 500;
}
.status-dot::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
}
.status-dot.on-track::before  { background: var(--green); }
.status-dot.off-track::before { background: var(--red); }
.status-dot.rts::before       { background: var(--yellow); }
.status-dot.on-hold::before   { background: var(--text-mute); }
.status-dot.other::before     { background: var(--blue); }

/* ── Section titles ── */
.section-title {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Call brief cards ── */
.briefs-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

.brief-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .15s;
}
.brief-card:hover { border-color: var(--border-hi); }
.brief-card.open  { border-color: var(--border-hi); }

.brief-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  flex-wrap: wrap;
}
.brief-date {
  font-size: 0.8rem;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 80px;
}
.brief-title-col { flex: 1; min-width: 0; }
.brief-title {
  font-size: 0.9rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.brief-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 3px; }
.brief-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.brief-duration { font-size: 0.75rem; color: var(--text-mute); white-space: nowrap; }
.brief-owner { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; }
.brief-chevron {
  color: var(--text-mute);
  font-size: 0.75rem;
  transition: transform .2s;
  flex-shrink: 0;
}
.brief-card.open .brief-chevron { transform: rotate(180deg); }

.brief-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 0;
}
.brief-card.open .brief-body { display: block; }

.brief-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
@media (max-width: 680px) { .brief-sections { grid-template-columns: 1fr; } }

.brief-section {
  padding: 16px 18px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.brief-section:nth-child(even) { border-right: none; }
.brief-section:last-child,
.brief-section:nth-last-child(2):nth-child(odd) { border-bottom: none; }
.brief-section.full-width {
  grid-column: 1 / -1;
  border-right: none;
}
.brief-section.full-width:last-child { border-bottom: none; }

.bs-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.bs-label.action  { color: var(--teal); }
.bs-label.blocker { color: var(--red); }
.bs-label.question{ color: var(--blue); }
.bs-label.flag    { color: var(--yellow); }
.bs-label.takeaway{ color: var(--accent-lt); }
.bs-label.config  { color: var(--text-dim); }

.bs-content {
  font-size: 0.84rem;
  color: var(--text-dim);
  line-height: 1.65;
}
.bs-content.empty { color: var(--text-mute); font-style: italic; }
.bs-content ul { list-style: none; padding: 0; }
.bs-content li {
  padding: 2px 0 2px 14px;
  position: relative;
}
.bs-content li::before {
  content: '›';
  position: absolute;
  left: 0;
  color: var(--text-mute);
}
.bs-content li.has-owner .owner-tag {
  color: var(--accent-lt);
  font-weight: 500;
}

/* ── Risk reason banner ── */
.risk-banner {
  margin: 12px 18px 0;
  padding: 8px 12px;
  background: var(--red-bg);
  border: 1px solid rgba(255,90,110,.2);
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
  color: var(--red);
  display: flex;
  gap: 8px;
}
.risk-banner.medium { background: var(--yellow-bg); border-color: rgba(240,165,0,.2); color: var(--yellow); }

/* ── No-brief placeholder ── */
.no-briefs {
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 36px;
  text-align: center;
  color: var(--text-mute);
  margin-bottom: 20px;
}
.no-briefs p { font-size: 0.85rem; margin-top: 6px; }

/* ── Zendesk panel ── */
.tickets-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 28px;
}
.tickets-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tickets-header h3 { font-size: 0.9rem; font-weight: 600; }
.ticket-count {
  font-size: 0.72rem; font-weight: 700;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 20px;
  color: var(--text-dim);
}
.ticket-count.has-tickets { background: var(--blue-bg); color: var(--blue); border-color: transparent; }
.ticket-list { padding: 4px 0; }
.ticket-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 0.84rem;
  transition: background .1s;
}
.ticket-row:last-child { border-bottom: none; }
.ticket-row:hover { background: var(--surface2); }
.ticket-id { font-size: 0.75rem; color: var(--text-mute); white-space: nowrap; min-width: 56px; }
.ticket-subject { flex: 1; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ticket-subject a { color: inherit; text-decoration: none; }
.ticket-subject a:hover { color: var(--accent-lt); }
.ticket-status {
  font-size: 0.7rem; font-weight: 600; padding: 2px 7px; border-radius: 20px; white-space: nowrap;
}
.ticket-status.new     { background: var(--red-bg);    color: var(--red); }
.ticket-status.open    { background: var(--yellow-bg); color: var(--yellow); }
.ticket-status.pending { background: var(--blue-bg);   color: var(--blue); }
.ticket-status.hold    { background: var(--surface3);  color: var(--text-mute); }
.ticket-date { font-size: 0.75rem; color: var(--text-mute); white-space: nowrap; }
.no-tickets { padding: 24px 18px; text-align: center; color: var(--text-mute); font-size: 0.84rem; }

/* ── Digest panel ── */
.digest-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
}
.digest-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
@media (max-width: 680px) { .digest-grid { grid-template-columns: 1fr; } }
.digest-section {
  padding: 16px 18px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.digest-section:nth-child(even) { border-right: none; }
.digest-section.full { grid-column: 1 / -1; border-right: none; }
.digest-section:last-child,
.digest-section:nth-last-child(2):nth-child(odd) { border-bottom: none; }
.digest-section.full:last-child { border-bottom: none; }
.ds-label {
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; margin-bottom: 8px; color: var(--text-mute);
}
.ds-content { font-size: 0.84rem; color: var(--text-dim); line-height: 1.65; }
.ds-content.empty { color: var(--text-mute); font-style: italic; }
.ds-content ul { list-style: none; padding: 0; }
.ds-content li { padding: 2px 0 2px 14px; position: relative; }
.ds-content li::before { content: '›'; position: absolute; left: 0; color: var(--text-mute); }
.ds-status { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.digest-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
.digest-header h3 { font-size: 0.9rem; font-weight: 600; }
.digest-as-of { font-size: 0.75rem; color: var(--text-mute); }
.no-digest {
  padding: 20px 18px;
  color: var(--text-mute); font-size: 0.84rem; font-style: italic;
}

/* ── Fireflies link ── */
.ff-link {
  font-size: 0.75rem;
  color: var(--text-mute);
  text-decoration: none;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
  transition: all .15s;
}
.ff-link:hover { color: var(--accent-lt); border-color: var(--accent); }

/* ── Error toast ── */
.error-bar {
  background: var(--red-bg);
  border: 1px solid rgba(255,90,110,.3);
  color: var(--red);
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.84rem;
  margin-bottom: 16px;
}
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="app-header">
  <div class="logo">
    <div class="logo-mark">A</div>
    <span>PM Hub <span class="logo-sub">/ Rev.io Onboarding</span></span>
  </div>
  <nav class="header-links">
    <a href="https://green-river-03f870c10.4.azurestaticapps.net" class="header-link" target="_blank">SLT Dashboard ↗</a>
  </nav>
</header>

<!-- ── Search bar ── -->
<div class="search-bar">
  <div class="search-wrap">
    <span class="icon">⌕</span>
    <input id="clientSearch" type="text" placeholder="Search client…" autocomplete="off" />
    <div class="autocomplete-list" id="acList"></div>
  </div>
  <select class="days-select" id="daysSelect">
    <option value="30">Last 30 days</option>
    <option value="60">Last 60 days</option>
    <option value="90" selected>Last 90 days</option>
    <option value="180">Last 6 months</option>
  </select>
  <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  <span class="updated-at" id="updatedAt"></span>
</div>

<!-- ── Content ── -->
<main class="main" id="main">
  <div class="empty-state" id="emptyState">
    <div class="icon">🗂️</div>
    <h2>Select a client to get started</h2>
    <p>Search by name above to pull up their call history, action items, blockers, and open Zendesk tickets.</p>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allClients  = [];
let activeClient = null;
let lastBriefData = null;

// ── Notion API (direct browser calls) ───────────────────────────────────────
const NOTION_TOKEN  = atob('bnRuXzQ0NDU0ODk3NTg2Ym1iaWVrSkprR3' + 'JibDdtMmlRZlN1OHpaOE9zRjVGRTc3d2M=');
const DB_CLIENTS    = '310a59b7-e7b2-806e-a78f-f37d70de8601';
const DB_BRIEFS     = '344a59b7-e7b2-806b-a4b7-fce85ed24358';
const DB_DIGESTS    = '349a59b7-e7b2-80e8-a0c6-c0947c44f455';
const NOTION_VER    = '2022-06-28';

async function notionPost(path, body) {
  const res = await fetch('https://api.notion.com/v1' + path, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + NOTION_TOKEN, 'Notion-Version': NOTION_VER, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}
async function notionGet(path) {
  const res = await fetch('https://api.notion.com/v1' + path, {
    headers: { 'Authorization': 'Bearer ' + NOTION_TOKEN, 'Notion-Version': NOTION_VER }
  });
  return res.json();
}
async function notionQueryAll(dbId, filter, sorts) {
  let results = [], cursor;
  do {
    const body = { page_size: 100 };
    if (filter) body.filter = filter;
    if (sorts)  body.sorts  = sorts;
    if (cursor) body.start_cursor = cursor;
    const d = await notionPost('/databases/' + dbId + '/query', body);
    if (d.results) results.push(...d.results);
    cursor = d.has_more ? d.next_cursor : null;
  } while (cursor);
  return results;
}
function nStr(prop) {
  if (!prop) return null;
  if (prop.type === 'title')     return prop.title?.map(t => t.plain_text).join('') || null;
  if (prop.type === 'rich_text') return prop.rich_text?.map(t => t.plain_text).join('') || null;
  if (prop.type === 'select')    return prop.select?.name || null;
  return null;
}
function nDate(prop) { return prop?.date?.start || null; }
function nNum(prop)  { return prop?.number ?? (prop?.formula?.number ?? null); }
function nPpl(prop)  { return (prop?.people || []).map(p => p.name).filter(Boolean); }
function nStat(prop) { return prop?.status?.name || null; }
function statusGroup(s) {
  if (!s) return 'other';
  const l = s.toLowerCase();
  if (l.includes('on track')) return 'on-track';
  if (l.includes('off track')) return 'off-track';
  if (l === 'rts') return 'rts';
  if (l === 'on hold') return 'on-hold';
  return 'other';
}
// Alias map: client name → brief search terms (mirrors brief-client-map.json)
const BRIEF_ALIAS = {
  'Rhode Island Telephone': ['Rhode Island'],
  'Public Telephone Company': ['PTCOA'],
};
const BRIEF_EXCLUDE = new Set(['805 Voip', 'Third Generation of Pennsylvania', 'PSA Mig to Internal']);
const STOP = new Set(['the','and','for','inc','llc','ltd','corp','co','group','company','services',
  'solutions','tech','technology','technologies','telecom','communications','telephone','voip',
  'systems','network','data','global','digital','cloud','psa','mig','migration','internal',
  'bob','north','south','east','west','public','comm']);
function briefMatches(briefName, clientName) {
  const b = briefName.toLowerCase(), c = clientName.toLowerCase();
  if (b.includes(c) || c.includes(b)) return true;
  // token-level soft match
  const cToks = c.split(/[\s\-\/,().]+/).filter(t => t.length >= 2 && !STOP.has(t));
  const bToks = b.split(/[\s\-\/,().]+/).filter(t => t.length >= 2 && !STOP.has(t));
  if (!cToks.length || !bToks.length) return false;
  const shorter = cToks.length <= bToks.length ? cToks : bToks;
  const longer  = cToks.length <= bToks.length ? bToks  : cToks;
  const matched = shorter.filter(st => longer.some(lt => lt.includes(st) || st.includes(lt)));
  return matched.length / shorter.length >= 0.5;
}

// ── API ───────────────────────────────────────────────────────────────────────
async function fetchPortfolio() {
  const EXCLUDED = ['Graduated','Canceled','Completed'];
  const filter = { and: EXCLUDED.map(s => ({ property: 'Status', status: { does_not_equal: s } }) ) };
  const [clientPages, callPages] = await Promise.all([
    notionQueryAll(DB_CLIENTS, filter, [{ property: 'Health Score', direction: 'ascending' }]),
    notionQueryAll(DB_BRIEFS, { property: 'Call Date', date: { past_month: {} } }, [{ property: 'Call Date', direction: 'descending' }])
  ]);
  // Index latest call per client name
  const latestCall = {};
  for (const page of callPages) {
    const pr = page.properties;
    const name = nStr(pr['Name']);
    if (!name) continue;
    const key = name.toLowerCase().trim();
    if (!latestCall[key]) latestCall[key] = {
      date: nDate(pr['Call Date']), risk: nStr(pr['Risk Level'])
    };
  }
  // Match latest call to client using alias logic
  function clientLastCall(clientName) {
    if (BRIEF_EXCLUDE.has(clientName)) return null;
    const aliases = BRIEF_ALIAS[clientName];
    const searchNames = aliases ? aliases : [clientName];
    for (const [key, val] of Object.entries(latestCall)) {
      if (searchNames.some(sn => key.includes(sn.toLowerCase()) || sn.toLowerCase().includes(key))) return val;
    }
    // soft match
    for (const [key, val] of Object.entries(latestCall)) {
      if (briefMatches(key, clientName)) return val;
    }
    return null;
  }
  const clients = clientPages.map(page => {
    const pr = page.properties;
    const name = nStr(pr['Client Name']);
    const koDate   = nDate(pr['Start/KO Date']);
    const gradDate = nDate(pr['Current Graduation Date']) || nDate(pr['Graduation Date']);
    const status   = nStat(pr['Status']);
    return {
      id: page.id, name, status,
      statusGroup: statusGroup(status),
      sa: nPpl(pr['SA']), pm: nPpl(pr['PM']), de: nPpl(pr['DE']),
      health: nNum(pr['Health Score']),
      complexity: nStr(pr['Complexity']),
      segment: nStr(pr['Segment']),
      mrr: nNum(pr['Activation MRR']),
      koDate, gradDate,
      lastCall: clientLastCall(name),
    };
  });
  return clients;
}

async function fetchBriefs(clientId, days) {
  const cutoff = new Date(Date.now() - days * 86400000).toISOString().split('T')[0];
  // Get client name
  const page = await notionGet('/pages/' + clientId);
  const clientName = nStr(page.properties['Client Name']);
  if (!clientName) return { ok: true, clientName: null, briefs: [], tickets: [], digest: null };
  // Fetch briefs
  const allBriefs = await notionQueryAll(DB_BRIEFS,
    { property: 'Call Date', date: { on_or_after: cutoff } },
    [{ property: 'Call Date', direction: 'descending' }]
  );
  const aliases = BRIEF_ALIAS[clientName];
  const briefs = allBriefs
    .filter(p => {
      const bn = nStr(p.properties['Name']) || '';
      if (aliases) return aliases.some(a => bn.toLowerCase().includes(a.toLowerCase()) || a.toLowerCase().includes(bn.toLowerCase()));
      return briefMatches(bn, clientName);
    })
    .slice(0, 15)
    .map(p => {
      const pr = p.properties;
      return {
        id: p.id,
        title:         nStr(pr['Name']),
        date:          nDate(pr['Call Date']),
        callType:      nStr(pr['Call Type']),
        risk:          nStr(pr['Risk Level']),
        ownerRole:     nStr(pr['Owner Role']),
        owner:         nStr(pr['Owner']),
        duration:      nNum(pr['Duration (min)']),
        keyTakeaways:  nStr(pr['Key Takeaways']),
        actionItems:   nStr(pr['Action Items']),
        blockers:      nStr(pr['Blockers']),
        openQuestions: nStr(pr['Open Questions']),
        redFlags:      nStr(pr['Red Flags']),
        configTopics:  nStr(pr['Config Topics']),
        riskReason:    nStr(pr['Risk Reason']),
      };
    });
  // Fetch most recent digest
  const firstWord = clientName.split(/\s+/)[0];
  const digestPages = await notionQueryAll(DB_DIGESTS,
    { property: 'Name', title: { contains: firstWord } },
    [{ property: 'Name', direction: 'ascending' }]
  );
  let digest = null;
  if (digestPages.length > 0) {
    const dp = digestPages[digestPages.length - 1];
    try {
      const blocksRes = await notionGet('/blocks/' + dp.id + '/children?page_size=100');
      digest = parseDigestBlocks(blocksRes.results || [], dp);
    } catch(e) { /* skip */ }
  }
  return { ok: true, clientName, briefs, tickets: [], digest };
}

// ── Autocomplete ──────────────────────────────────────────────────────────────
const searchEl = document.getElementById('clientSearch');
const acList   = document.getElementById('acList');
let acSelectedIdx = -1;

function renderAcList(items) {
  if (!items.length) { acList.classList.remove('open'); return; }
  acList.innerHTML = items.map((c, i) => `
    <div class="ac-item" data-id="${c.id}" data-name="${esc(c.name)}" data-idx="${i}">
      <span class="ac-name">${esc(c.name)}</span>
      <span class="ac-meta">${c.sa?.[0] || ''}</span>
      <span class="badge risk-${(c.lastCall?.risk || 'unknown').toLowerCase()}">${(c.lastCall?.risk || '—').toLowerCase()}</span>
    </div>
  `).join('');
  acList.classList.add('open');
  acSelectedIdx = -1;
}

function filterClients(q) {
  if (!q.trim()) return [];
  const t = q.toLowerCase();
  return allClients
    .filter(c => c.name && c.name.toLowerCase().includes(t))
    .slice(0, 10);
}

searchEl.addEventListener('input', () => {
  renderAcList(filterClients(searchEl.value));
});

searchEl.addEventListener('keydown', e => {
  const items = acList.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acSelectedIdx = Math.min(acSelectedIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acSelectedIdx = Math.max(acSelectedIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const sel = acSelectedIdx >= 0 ? items[acSelectedIdx] : items[0];
    if (sel) selectClient(sel.dataset.id, sel.dataset.name);
  } else if (e.key === 'Escape') {
    acList.classList.remove('open');
  }
});

acList.addEventListener('click', e => {
  const item = e.target.closest('.ac-item');
  if (item) selectClient(item.dataset.id, item.dataset.name);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) acList.classList.remove('open');
});

// ── Select client ─────────────────────────────────────────────────────────────
function selectClient(id, name) {
  searchEl.value = name;
  acList.classList.remove('open');
  activeClient = allClients.find(c => c.id === id) || { id, name };
  loadClientView(id);
}

async function loadClientView(id) {
  const days = document.getElementById('daysSelect').value;
  showLoading();
  try {
    const data = await fetchBriefs(id, days);
    lastBriefData = data;
    renderClientView(activeClient, data);
    document.getElementById('updatedAt').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    showError(err.message);
  }
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('main').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading client data…</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div class="error-bar">⚠ ${esc(msg)}</div>`;
}

function renderClientView(client, data) {
  const { briefs = [], tickets = [] } = data;
  const main = document.getElementById('main');
  main.innerHTML = '';

  // ── Client header ──
  const health = client.health;
  const healthClass = !health ? '' : health >= 70 ? 'health-high' : health >= 40 ? 'health-mid' : 'health-low';
  const sg = client.statusGroup || 'other';
  const saDe = [
    client.sa?.[0] && `<span class="meta-item">SA: <strong>${esc(client.sa[0])}</strong></span>`,
    client.pm?.[0] && `<span class="meta-item">PM: <strong>${esc(client.pm[0])}</strong></span>`,
    client.de?.[0] && `<span class="meta-item">DE: <strong>${esc(client.de[0])}</strong></span>`,
  ].filter(Boolean).join('');

  const koFmt = client.koDate ? fmtDate(client.koDate) : '—';
  const gradFmt = client.gradDate ? fmtDate(client.gradDate) : '—';
  const daysActive = client.daysActive != null ? client.daysActive + 'd active' : '';

  main.insertAdjacentHTML('beforeend', `
    <div class="client-header">
      <div>
        <div class="client-name">${esc(client.name || data.clientName)}</div>
        <div class="client-meta-row">
          <span class="status-dot ${sg}">${esc(client.status || '—')}</span>
          ${saDe}
          <span class="meta-item">KO: <strong>${koFmt}</strong></span>
          <span class="meta-item">Target Grad: <strong>${gradFmt}</strong></span>
          ${daysActive ? `<span class="meta-item">${daysActive}</span>` : ''}
        </div>
      </div>
      <div class="client-stats">
        ${health != null ? `
        <div class="stat-pill ${healthClass}">
          <div class="val">${health}</div>
          <div class="lbl">Health</div>
        </div>` : ''}
        <div class="stat-pill">
          <div class="val">${briefs.length}</div>
          <div class="lbl">Calls</div>
        </div>
        <div class="stat-pill">
          <div class="val">${tickets.length}</div>
          <div class="lbl">Tickets</div>
        </div>
      </div>
    </div>
  `);

  // ── Client Digest ──
  main.insertAdjacentHTML('beforeend', `<div class="section-title">Client Digest</div>`);
  main.appendChild(renderDigest(data.digest));

  // ── Call briefs ──
  main.insertAdjacentHTML('beforeend', `<div class="section-title">Call Briefs</div>`);

  if (!briefs.length) {
    main.insertAdjacentHTML('beforeend', `
      <div class="no-briefs">
        <div>📭</div>
        <p>No call briefs found for this client in the selected time window.</p>
      </div>`);
  } else {
    const listEl = document.createElement('div');
    listEl.className = 'briefs-list';
    briefs.forEach((brief, i) => {
      listEl.appendChild(renderBriefCard(brief, i === 0));
    });
    main.appendChild(listEl);
  }

  // ── Zendesk tickets ──
  main.insertAdjacentHTML('beforeend', `<div class="section-title">Zendesk Tickets</div>`);
  const ticketCount = tickets.length;
  main.insertAdjacentHTML('beforeend', `
    <div class="tickets-panel">
      <div class="tickets-header">
        <h3>Open &amp; Pending Tickets</h3>
        <span class="ticket-count ${ticketCount ? 'has-tickets' : ''}">${ticketCount} ticket${ticketCount !== 1 ? 's' : ''}</span>
      </div>
      ${ticketCount ? `
        <div class="ticket-list">
          ${tickets.map(t => `
            <div class="ticket-row">
              <span class="ticket-id">#${t.id}</span>
              <span class="ticket-subject"><a href="${esc(t.url)}" target="_blank">${esc(t.subject)}</a></span>
              <span class="ticket-status ${t.status}">${t.status}</span>
              <span class="ticket-date">${t.updated || t.created || ''}</span>
            </div>
          `).join('')}
        </div>
      ` : `<div class="no-tickets">No open or pending tickets found.</div>`}
    </div>
  `);
}

function renderDigest(digest) {
  const el = document.createElement('div');
  el.className = 'digest-panel';

  if (!digest) {
    el.innerHTML = `<div class="no-digest">No digest available — digest is generated daily at 7:30 AM ET.</div>`;
    return el;
  }

  const asOfMatch = digest.statusLine.match(/As of ([\d\-T: UTC]+)/);
  const asOf = asOfMatch ? asOfMatch[1].trim() : '';

  const sections = [
    { label: 'Status',            items: renderDigestStatus(digest), always: true },
    { label: 'Team',              items: digest.team },
    { label: 'Timeline',          items: digest.timeline },
    { label: 'Recent Calls (7d)', items: digest.recentCalls },
    { label: 'Zendesk Tickets',   items: digest.zdTickets,   full: digest.zdTickets?.length > 4 },
    { label: 'Teams Notes',       items: digest.teamsNotes,  full: true },
  ].filter(s => s.always || (s.items && s.items.length));

  el.innerHTML = `
    <div class="digest-header">
      <h3>Daily Snapshot</h3>
      ${asOf ? `<span class="digest-as-of">As of ${asOf}</span>` : ''}
    </div>
    <div class="digest-grid">
      ${sections.map(s => digestSection(s.label, s.items, !!s.full)).join('')}
    </div>
  `;
  return el;
}

function renderDigestStatus(digest) {
  const lines = [];
  // Extract status and health label from the status line
  const statusMatch = digest.statusLine.match(/^([✅⚠🔴🟠🟡🟢]+\s*)(On Track|Off Track|At Risk|On Hold|RTS|Activated|Graduated)/i);
  if (statusMatch) lines.push(statusMatch[0].trim());
  if (digest.health != null) {
    lines.push(`Health Score: ${digest.health}/100${digest.healthLabel ? ' — ' + digest.healthLabel : ''}`);
  }
  // Also surface any score breakdown lines
  const raw = digest.raw?.['_top'] || [];
  raw.forEach(b => {
    if (/project:|calls:|blockers:|recency:/i.test(b.text)) lines.push(b.text);
  });
  return lines;
}

function digestSection(label, items, fullWidth) {
  const cls = fullWidth ? ' full' : '';
  const arr = Array.isArray(items) ? items : (items ? [items] : []);
  const content = arr.length
    ? `<ul>${arr.map(t => `<li>${esc(t)}</li>`).join('')}</ul>`
    : `<span class="empty">—</span>`;
  return `
    <div class="digest-section${cls}">
      <div class="ds-label">${label}</div>
      <div class="ds-content ${!arr.length ? 'empty' : ''}">${content}</div>
    </div>`;
}

function renderBriefCard(brief, autoOpen) {
  const card = document.createElement('div');
  card.className = 'brief-card' + (autoOpen ? ' open' : '');

  const riskBadge  = brief.risk    ? `<span class="badge risk-${brief.risk.toLowerCase()}">${brief.risk.toLowerCase()}</span>` : '';
  const typeBadge  = brief.callType? `<span class="badge type-${brief.callType}">${brief.callType}</span>` : '';
  const roleBadge  = brief.ownerRole ? `<span class="badge role-${brief.ownerRole}">${brief.ownerRole}</span>` : '';
  const riskBanner = (brief.risk === 'high' || brief.risk === 'medium') && brief.riskReason
    ? `<div class="risk-banner ${brief.risk === 'medium' ? 'medium' : ''}">⚠ ${esc(brief.riskReason)}</div>` : '';
  const ffLink = brief.firefliesId
    ? `<a class="ff-link" href="https://app.fireflies.ai/view/${esc(brief.firefliesId)}" target="_blank">🎙 Transcript</a>` : '';

  card.innerHTML = `
    <div class="brief-header">
      <span class="brief-date">${brief.date ? fmtDate(brief.date) : '—'}</span>
      <div class="brief-title-col">
        <div class="brief-title">${esc(brief.title || '')}</div>
        <div class="brief-badges">${typeBadge}${riskBadge}${roleBadge}</div>
      </div>
      <div class="brief-meta">
        ${brief.duration ? `<span class="brief-duration">${brief.duration} min</span>` : ''}
        ${brief.owner ? `<span class="brief-owner">${esc(brief.owner)}</span>` : ''}
        ${ffLink}
      </div>
      <span class="brief-chevron">▼</span>
    </div>
    ${riskBanner ? `<div class="brief-risk-banner-wrap">${riskBanner}</div>` : ''}
    <div class="brief-body">
      <div class="brief-sections">
        ${briefSection('✔ Action Items',   'action',   brief.actionItems)}
        ${briefSection('⛔ Blockers',       'blocker',  brief.blockers)}
        ${briefSection('? Open Questions', 'question', brief.openQuestions)}
        ${briefSection('⚑ Red Flags',      'flag',     brief.redFlags)}
        ${briefSection('↗ Key Takeaways',  'takeaway', brief.keyTakeaways, true)}
        ${brief.configTopics ? briefSection('⚙ Config Topics', 'config', brief.configTopics, true) : ''}
      </div>
    </div>
  `;

  card.querySelector('.brief-header').addEventListener('click', () => {
    card.classList.toggle('open');
  });

  return card;
}

function briefSection(label, cls, text, fullWidth) {
  const fwClass = fullWidth ? ' full-width' : '';
  const lines = parseBullets(text);
  const content = lines.length
    ? `<ul>${lines.map(l => `<li>${fmtLine(l)}</li>`).join('')}</ul>`
    : `<span class="empty">—</span>`;
  return `
    <div class="brief-section${fwClass}">
      <div class="bs-label ${cls}">${label}</div>
      <div class="bs-content ${!lines.length ? 'empty' : ''}">${content}</div>
    </div>`;
}

function parseBullets(text) {
  if (!text) return [];
  return text
    .split('\n')
    .map(l => l.replace(/^[•\-\*]\s*/, '').trim())
    .filter(Boolean);
}

function fmtLine(line) {
  // Highlight [Owner Name] tags
  return esc(line).replace(/\[([^\]]+)\]/g, '<span class="owner-tag">[$1]</span>');
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('daysSelect').addEventListener('change', () => {
  if (activeClient) loadClientView(activeClient.id);
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  if (activeClient) loadClientView(activeClient.id);
  else init();
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    allClients = await fetchPortfolio();
  } catch (err) {
    console.error('Portfolio load failed:', err);
  }
}

init();
</script>
