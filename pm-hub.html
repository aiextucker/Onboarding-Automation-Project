<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Hub — Rev.io Onboarding</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --surface:   #181c27;
  --surface2:  #1e2436;
  --surface3:  #242840;
  --border:    #2a3050;
  --border-hi: #3d4870;
  --accent:    #6c63ff;
  --accent-dk: #5549e0;
  --accent-lt: #8b84ff;
  --teal:      #00d4aa;
  --teal-dk:   #00b090;
  --text:      #e8e8f0;
  --text-dim:  #8a90b0;
  --text-mute: #525870;
  --red:       #ff5a6e;
  --red-bg:    rgba(255,90,110,0.1);
  --yellow:    #f0a500;
  --yellow-bg: rgba(240,165,0,0.1);
  --green:     #00d4aa;
  --green-bg:  rgba(0,212,170,0.1);
  --blue:      #4fa3ff;
  --blue-bg:   rgba(79,163,255,0.1);
  --purple:    #a78bfa;
  --purple-bg: rgba(167,139,250,0.1);
  --orange:    #fb923c;
  --orange-bg: rgba(251,146,60,0.1);
  --radius:    10px;
  --radius-sm: 6px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

html { font-size: 15px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── Header ── */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; }
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.78rem; color: #fff;
}
.logo-sub { font-size: 0.72rem; color: var(--text-mute); font-weight: 400; margin-left: 2px; }
.header-links { display: flex; gap: 6px; }
.header-link {
  color: var(--text-dim); text-decoration: none; font-size: 0.8rem;
  padding: 4px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); transition: all .15s;
}
.header-link:hover { color: var(--text); border-color: var(--border-hi); }
.header-link.active { color: var(--accent); border-color: var(--accent); }

/* ── Search bar ── */
.search-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 260px;
  max-width: 480px;
}
.search-wrap .icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-mute); pointer-events: none; font-size: 1rem;
}
#clientSearch {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px 8px 34px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  outline: none;
  transition: border-color .15s;
}
#clientSearch:focus { border-color: var(--accent); }
.autocomplete-list {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface2);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius-sm);
  max-height: 280px;
  overflow-y: auto;
  z-index: 200;
  display: none;
}
.autocomplete-list.open { display: block; }
.ac-item {
  padding: 9px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.88rem;
  transition: background .1s;
}
.ac-item:hover, .ac-item.selected { background: var(--surface3); }
.ac-item .ac-name { font-weight: 500; flex: 1; }
.ac-item .ac-meta { font-size: 0.75rem; color: var(--text-mute); }
.days-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
}
.days-select:focus { border-color: var(--accent); }
.refresh-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.82rem;
  transition: all .15s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.updated-at { font-size: 0.75rem; color: var(--text-mute); }

/* ── Main layout ── */
.main { padding: 24px; max-width: 1100px; margin: 0 auto; }

/* ── Empty / loading states ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-mute);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state h2 { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 6px; }
.empty-state p { font-size: 0.85rem; max-width: 360px; margin: 0 auto; }

.loading { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Client header card ── */
.client-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.client-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
.client-meta-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-top: 8px; }
.meta-item { display: flex; align-items: center; gap: 5px; font-size: 0.82rem; color: var(--text-dim); }
.meta-item strong { color: var(--text); }
.client-stats { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
.stat-pill {
  text-align: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  min-width: 90px;
}
.stat-pill .val { font-size: 1.4rem; font-weight: 700; line-height: 1; }
.stat-pill .lbl { font-size: 0.7rem; color: var(--text-mute); margin-top: 3px; text-transform: uppercase; letter-spacing: .05em; }
.stat-pill.health-low .val  { color: var(--red); }
.stat-pill.health-mid .val  { color: var(--yellow); }
.stat-pill.health-high .val { color: var(--green); }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center;
  font-size: 0.72rem; font-weight: 600;
  padding: 2px 9px; border-radius: 20px;
  letter-spacing: .03em; white-space: nowrap;
}
.badge.risk-high   { background: var(--red-bg);    color: var(--red); }
.badge.risk-medium { background: var(--yellow-bg); color: var(--yellow); }
.badge.risk-low    { background: var(--green-bg);  color: var(--green); }
.badge.risk-unknown{ background: var(--surface3);  color: var(--text-mute); }
.badge.type-kickoff    { background: var(--purple-bg); color: var(--purple); }
.badge.type-config     { background: var(--blue-bg);   color: var(--blue); }
.badge.type-training   { background: var(--teal-bg, rgba(0,212,170,.1)); color: var(--teal); }
.badge.type-support    { background: var(--orange-bg); color: var(--orange); }
.badge.type-other      { background: var(--surface3);  color: var(--text-dim); }
.badge.type-demo       { background: var(--purple-bg); color: var(--purple); }
.badge.role-SA  { background: var(--blue-bg);   color: var(--blue); }
.badge.role-PM  { background: var(--purple-bg); color: var(--purple); }
.badge.role-DE  { background: var(--orange-bg); color: var(--orange); }
.badge.role-CS  { background: var(--green-bg);  color: var(--green); }

.status-dot {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.8rem; font-weight: 500;
}
.status-dot::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
}
.status-dot.on-track::before  { background: var(--green); }
.status-dot.off-track::before { background: var(--red); }
.status-dot.rts::before       { background: var(--yellow); }
.status-dot.on-hold::before   { background: var(--text-mute); }
.status-dot.other::before     { background: var(--blue); }

/* ── Section titles ── */
.section-title {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Call brief cards ── */
.briefs-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

.brief-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .15s;
}
.brief-card:hover { border-color: var(--border-hi); }
.brief-card.open  { border-color: var(--border-hi); }

.brief-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  flex-wrap: wrap;
}
.brief-date {
  font-size: 0.8rem;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 80px;
}
.brief-title-col { flex: 1; min-width: 0; }
.brief-title {
  font-size: 0.9rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.brief-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 3px; }
.brief-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.brief-duration { font-size: 0.75rem; color: var(--text-mute); white-space: nowrap; }
.brief-owner { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; }
.brief-chevron {
  color: var(--text-mute);
  font-size: 0.75rem;
  transition: transform .2s;
  flex-shrink: 0;
}
.brief-card.open .brief-chevron { transform: rotate(180deg); }

.brief-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 0;
}
.brief-card.open .brief-body { display: block; }

.brief-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
@media (max-width: 680px) { .brief-sections { grid-template-columns: 1fr; } }

.brief-section {
  padding: 16px 18px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.brief-section:nth-child(even) { border-right: none; }
.brief-section:last-child,
.brief-section:nth-last-child(2):nth-child(odd) { border-bottom: none; }
.brief-section.full-width {
  grid-column: 1 / -1;
  border-right: none;
}
.brief-section.full-width:last-child { border-bottom: none; }

.bs-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.bs-label.action  { color: var(--teal); }
.bs-label.blocker { color: var(--red); }
.bs-label.question{ color: var(--blue); }
.bs-label.flag    { color: var(--yellow); }
.bs-label.takeaway{ color: var(--accent-lt); }
.bs-label.config  { color: var(--text-dim); }

.bs-content {
  font-size: 0.84rem;
  color: var(--text-dim);
  line-height: 1.65;
}
.bs-content.empty { color: var(--text-mute); font-style: italic; }
.bs-content ul { list-style: none; padding: 0; }
.bs-content li {
  padding: 2px 0 2px 14px;
  position: relative;
}
.bs-content li::before {
  content: '›';
  position: absolute;
  left: 0;
  color: var(--text-mute);
}
.bs-content li.has-owner .owner-tag {
  color: var(--accent-lt);
  font-weight: 500;
}

/* ── Risk reason banner ── */
.risk-banner {
  margin: 12px 18px 0;
  padding: 8px 12px;
  background: var(--red-bg);
  border: 1px solid rgba(255,90,110,.2);
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
  color: var(--red);
  display: flex;
  gap: 8px;
}
.risk-banner.medium { background: var(--yellow-bg); border-color: rgba(240,165,0,.2); color: var(--yellow); }

/* ── No-brief placeholder ── */
.no-briefs {
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 36px;
  text-align: center;
  color: var(--text-mute);
  margin-bottom: 20px;
}
.no-briefs p { font-size: 0.85rem; margin-top: 6px; }

/* ── Zendesk panel ── */
.tickets-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 28px;
}
.tickets-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tickets-header h3 { font-size: 0.9rem; font-weight: 600; }
.ticket-count {
  font-size: 0.72rem; font-weight: 700;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 20px;
  color: var(--text-dim);
}
.ticket-count.has-tickets { background: var(--blue-bg); color: var(--blue); border-color: transparent; }
.ticket-list { padding: 4px 0; }
.ticket-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 0.84rem;
  transition: background .1s;
}
.ticket-row:last-child { border-bottom: none; }
.ticket-row:hover { background: var(--surface2); }
.ticket-id { font-size: 0.75rem; color: var(--text-mute); white-space: nowrap; min-width: 56px; }
.ticket-subject { flex: 1; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ticket-subject a { color: inherit; text-decoration: none; }
.ticket-subject a:hover { color: var(--accent-lt); }
.ticket-status {
  font-size: 0.7rem; font-weight: 600; padding: 2px 7px; border-radius: 20px; white-space: nowrap;
}
.ticket-status.new     { background: var(--red-bg);    color: var(--red); }
.ticket-status.open    { background: var(--yellow-bg); color: var(--yellow); }
.ticket-status.pending { background: var(--blue-bg);   color: var(--blue); }
.ticket-status.hold    { background: var(--surface3);  color: var(--text-mute); }
.ticket-date { font-size: 0.75rem; color: var(--text-mute); white-space: nowrap; }
.no-tickets { padding: 24px 18px; text-align: center; color: var(--text-mute); font-size: 0.84rem; }

/* ── Digest panel ── */
.digest-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
}
.digest-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
@media (max-width: 680px) { .digest-grid { grid-template-columns: 1fr; } }
.digest-section {
  padding: 16px 18px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.digest-section:nth-child(even) { border-right: none; }
.digest-section.full { grid-column: 1 / -1; border-right: none; }
.digest-section:last-child,
.digest-section:nth-last-child(2):nth-child(odd) { border-bottom: none; }
.digest-section.full:last-child { border-bottom: none; }
.ds-label {
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; margin-bottom: 8px; color: var(--text-mute);
}
.ds-content { font-size: 0.84rem; color: var(--text-dim); line-height: 1.65; }
.ds-content.empty { color: var(--text-mute); font-style: italic; }
.ds-content ul { list-style: none; padding: 0; }
.ds-content li { padding: 2px 0 2px 14px; position: relative; }
.ds-content li::before { content: '›'; position: absolute; left: 0; color: var(--text-mute); }
.ds-status { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.digest-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
.digest-header h3 { font-size: 0.9rem; font-weight: 600; }
.digest-as-of { font-size: 0.75rem; color: var(--text-mute); }
.no-digest {
  padding: 20px 18px;
  color: var(--text-mute); font-size: 0.84rem; font-style: italic;
}

/* ── Fireflies link ── */
.ff-link {
  font-size: 0.75rem;
  color: var(--text-mute);
  text-decoration: none;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
  transition: all .15s;
}
.ff-link:hover { color: var(--accent-lt); border-color: var(--accent); }

/* ── Error toast ── */
.error-bar {
  background: var(--red-bg);
  border: 1px solid rgba(255,90,110,.3);
  color: var(--red);
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.84rem;
  margin-bottom: 16px;
}

/* ── Quick links bar ── */
.quick-links-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.ql-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.8rem;
  font-weight: 500;
  transition: all .15s;
  background: var(--surface);
}
.ql-link:hover { color: var(--text); border-color: var(--border-hi); }
.ql-link.wrike  { border-color: rgba(106,100,255,.3); }
.ql-link.wrike:hover  { color: var(--accent-lt); border-color: var(--accent); }
.ql-link.zd    { border-color: rgba(0,212,170,.3); }
.ql-link.zd:hover    { color: var(--teal); border-color: var(--teal); }
.ql-link.notion { border-color: rgba(255,255,255,.15); }
.ql-sep { flex: 1; }
.pptx-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(240,165,0,.4);
  background: var(--yellow-bg);
  color: var(--yellow);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.pptx-btn:hover { border-color: var(--yellow); background: rgba(240,165,0,.15); }
.pptx-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── Latest call summary ── */
.latest-call-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
}
.latest-call-panel.risk-high { border-left-color: var(--red); }
.latest-call-panel.risk-medium { border-left-color: var(--yellow); }
.lc-header {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.lc-title { font-size: 0.88rem; font-weight: 600; }
.lc-meta { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; color: var(--text-mute); }
.lc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}
@media (max-width: 700px) { .lc-grid { grid-template-columns: 1fr; } }
.lc-col {
  padding: 16px 18px;
  border-right: 1px solid var(--border);
}
.lc-col:last-child { border-right: none; }
.lc-col-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 10px;
}
.lc-col-label.action  { color: var(--teal); }
.lc-col-label.blocker { color: var(--red); }
.lc-col-label.next    { color: var(--accent-lt); }
.lc-items { list-style: none; padding: 0; }
.lc-items li {
  font-size: 0.83rem;
  color: var(--text-dim);
  line-height: 1.55;
  padding: 3px 0 3px 14px;
  position: relative;
  border-bottom: 1px solid var(--border);
}
.lc-items li:last-child { border-bottom: none; }
.lc-items li::before { content: '›'; position: absolute; left: 0; color: var(--text-mute); }
.lc-empty { font-size: 0.82rem; color: var(--text-mute); font-style: italic; padding: 4px 0; }
.no-latest-call {
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  color: var(--text-mute);
  font-size: 0.84rem;
  margin-bottom: 20px;
}

/* ── Milestone timeline ── */
.milestone-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}
.ms-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-size: 0.78rem;
}
.ms-label { color: var(--text-mute); font-size: 0.7rem; margin-bottom: 2px; }
.ms-date  { color: var(--text); font-weight: 600; }
.ms-date.past   { color: var(--teal); }
.ms-date.future { color: var(--yellow); }
.ms-date.overdue{ color: var(--red); }

/* ── Section title ── */
.section-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-mute);
  margin: 28px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
</style>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body>

<!-- ── Header ── -->
<header class="app-header">
  <div class="logo">
    <div class="logo-mark">A</div>
    <span>PM Hub <span class="logo-sub">/ Rev.io Onboarding</span></span>
  </div>
  <nav class="header-links">
    <a href="https://green-river-03f870c10.4.azurestaticapps.net" class="header-link" target="_blank">SLT Dashboard ↗</a>
  </nav>
</header>

<!-- ── Search bar ── -->
<div class="search-bar">
  <div class="search-wrap">
    <span class="icon">⌕</span>
    <input id="clientSearch" type="text" placeholder="Search client…" autocomplete="off" />
    <div class="autocomplete-list" id="acList"></div>
  </div>
  <select class="days-select" id="daysSelect">
    <option value="30">Last 30 days</option>
    <option value="60">Last 60 days</option>
    <option value="90" selected>Last 90 days</option>
    <option value="180">Last 6 months</option>
  </select>
  <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  <span class="updated-at" id="updatedAt"></span>
</div>

<!-- ── Content ── -->
<main class="main" id="main">
  <div class="empty-state" id="emptyState">
    <div class="icon">🗂️</div>
    <h2>Select a client to get started</h2>
    <p>Search by name above to pull up their call history, action items, blockers, and open Zendesk tickets.</p>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allClients  = [];
let activeClient = null;
let lastBriefData = null;

// ── Snapshot-based data (GitHub Actions refreshes every 15 min) ─────────────
let snapshot = null;

function statusGroup(s) {
  if (!s) return 'other';
  const l = s.toLowerCase();
  if (l.includes('on track'))  return 'on-track';
  if (l.includes('off track')) return 'off-track';
  if (l === 'rts')     return 'rts';
  if (l === 'on hold') return 'on-hold';
  return 'other';
}

// ── API ───────────────────────────────────────────────────────────────────────
async function fetchPortfolio() {
  const res = await fetch('data/portfolio.json?_=' + Date.now());
  if (!res.ok) throw new Error('Portfolio snapshot unavailable (' + res.status + '). Try refreshing.');
  snapshot = await res.json();
  // Update the timestamp display
  if (snapshot.updatedAt) {
    const mins = Math.round((Date.now() - new Date(snapshot.updatedAt).getTime()) / 60000);
    const label = mins < 2 ? 'just now' : mins + 'm ago';
    document.getElementById('updatedAt').textContent = 'Data from ' + label + ' · refreshes every 15m';
  }
  return (snapshot.clients || []).map(c => ({ ...c, statusGroup: statusGroup(c.status) }));
}

async function fetchBriefs(clientId, days) {
  if (!snapshot) throw new Error('Portfolio not loaded — please refresh.');
  const client = allClients.find(c => c.id === clientId);
  const clientName = client?.name || null;
  const cutoff = new Date(Date.now() - days * 86400000).toISOString().split('T')[0];
  const briefs = (snapshot.briefsByClientId?.[clientId] || [])
    .filter(b => !b.date || b.date >= cutoff)
    .slice(0, 20);
  const tickets = snapshot.ticketsByClientId?.[clientId] || [];
  const digest  = snapshot.digestsByClientId?.[clientId] || null;
  return { ok: true, clientName, briefs, tickets, digest };
}

// ── Autocomplete ──────────────────────────────────────────────────────────────
const searchEl = document.getElementById('clientSearch');
const acList   = document.getElementById('acList');
let acSelectedIdx = -1;

function renderAcList(items) {
  if (!items.length) { acList.classList.remove('open'); return; }
  acList.innerHTML = items.map((c, i) => `
    <div class="ac-item" data-id="${c.id}" data-name="${esc(c.name)}" data-idx="${i}">
      <span class="ac-name">${esc(c.name)}</span>
      <span class="ac-meta">${c.sa?.[0] || ''}</span>
      <span class="badge risk-${(c.lastCall?.risk || 'unknown').toLowerCase()}">${(c.lastCall?.risk || '—').toLowerCase()}</span>
    </div>
  `).join('');
  acList.classList.add('open');
  acSelectedIdx = -1;
}

function filterClients(q) {
  if (!q.trim()) return [];
  const t = q.toLowerCase();
  return allClients
    .filter(c => c.name && c.name.toLowerCase().includes(t))
    .slice(0, 10);
}

searchEl.addEventListener('input', () => {
  renderAcList(filterClients(searchEl.value));
});

searchEl.addEventListener('keydown', e => {
  const items = acList.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acSelectedIdx = Math.min(acSelectedIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acSelectedIdx = Math.max(acSelectedIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const sel = acSelectedIdx >= 0 ? items[acSelectedIdx] : items[0];
    if (sel) selectClient(sel.dataset.id, sel.dataset.name);
  } else if (e.key === 'Escape') {
    acList.classList.remove('open');
  }
});

acList.addEventListener('click', e => {
  const item = e.target.closest('.ac-item');
  if (item) selectClient(item.dataset.id, item.dataset.name);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) acList.classList.remove('open');
});

// ── Select client ─────────────────────────────────────────────────────────────
function selectClient(id, name) {
  searchEl.value = name;
  acList.classList.remove('open');
  activeClient = allClients.find(c => c.id === id) || { id, name };
  loadClientView(id);
}

async function loadClientView(id) {
  const days = document.getElementById('daysSelect').value;
  showLoading();
  try {
    const data = await fetchBriefs(id, days);
    lastBriefData = data;
    renderClientView(activeClient, data);
    document.getElementById('updatedAt').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    showError(err.message);
  }
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('main').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading client data…</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div class="error-bar">⚠ ${esc(msg)}</div>`;
}

function renderClientView(client, data) {
  const { briefs = [], tickets = [] } = data;
  const main = document.getElementById('main');
  main.innerHTML = '';

  // ── Client header ──
  const health = client.health;
  const healthClass = !health ? '' : health >= 70 ? 'health-high' : health >= 40 ? 'health-mid' : 'health-low';
  const sg = client.statusGroup || 'other';
  const team = [
    ...(client.sa  || []).map(n => `SA: <strong>${esc(n)}</strong>`),
    ...(client.pm  || []).map(n => `PM: <strong>${esc(n)}</strong>`),
    ...(client.de  || []).map(n => `DE: <strong>${esc(n)}</strong>`),
    ...(client.csa || []).map(n => `CSA: <strong>${esc(n)}</strong>`),
  ].map(s => `<span class="meta-item">${s}</span>`).join('');
  const daysActive = client.daysActive != null ? client.daysActive + 'd active' : '';

  main.insertAdjacentHTML('beforeend', `
    <div class="client-header">
      <div>
        <div class="client-name">${esc(client.name || data.clientName)}</div>
        <div class="client-meta-row">
          <span class="status-dot ${sg}">${esc(client.status || '—')}</span>
          ${team}
          ${daysActive ? `<span class="meta-item">${daysActive}</span>` : ''}
        </div>
      </div>
      <div class="client-stats">
        ${health != null ? `<div class="stat-pill ${healthClass}"><div class="val">${health}</div><div class="lbl">Health</div></div>` : ''}
        <div class="stat-pill"><div class="val">${briefs.length}</div><div class="lbl">Calls</div></div>
        <div class="stat-pill"><div class="val">${tickets.length}</div><div class="lbl">Tickets</div></div>
      </div>
    </div>
  `);

  // ── Quick links bar ──
  main.insertAdjacentHTML('beforeend', `
    <div class="quick-links-bar">
      ${client.wrikeUrl ? `<a class="ql-link wrike" href="${esc(client.wrikeUrl)}" target="_blank">📊 Wrike</a>` : ''}
      <a class="ql-link zd" href="https://rev-io.zendesk.com/agent/organizations" target="_blank">🎫 Zendesk</a>
      ${client.notionUrl ? `<a class="ql-link notion" href="${esc(client.notionUrl)}" target="_blank">📝 Notion</a>` : ''}
      <span class="ql-sep"></span>
      <button class="pptx-btn" id="pptxBtn" onclick="generatePptx()">▶ Generate Tracker</button>
    </div>
  `);

  // ── Milestone timeline ──
  const today = new Date().toISOString().split('T')[0];
  const milestones = [
    { label: 'Kickoff',      date: client.koDate },
    { label: 'Charter',      date: client.charterDate },
    { label: 'Activation',   date: client.activationDate },
    { label: '1st Bill Out', date: client.billOutDate },
    { label: 'Graduation',   date: client.gradDate },
  ].filter(m => m.date);
  if (milestones.length) {
    main.insertAdjacentHTML('beforeend', `
      <div class="milestone-row">
        ${milestones.map(m => {
          const cls = m.date <= today ? 'past' : 'future';
          return `<div class="ms-item"><div class="ms-label">${m.label}</div><div class="ms-date ${cls}">${fmtDate(m.date)}</div></div>`;
        }).join('')}
      </div>`);
  }

  // ── Latest call summary (hero) ──
  const latest = briefs[0];
  if (latest) {
    const riskCls = latest.risk === 'high' ? 'risk-high' : latest.risk === 'medium' ? 'risk-medium' : '';
    const riskBadge = latest.risk ? `<span class="badge risk-${latest.risk.toLowerCase()}">${latest.risk.toLowerCase()}</span>` : '';
    const typeBadge = latest.callType ? `<span class="badge type-${latest.callType}">${latest.callType}</span>` : '';
    const ffLink = latest.firefliesId
      ? `<a class="ff-link" href="https://app.fireflies.ai/view/${esc(latest.firefliesId)}" target="_blank">🎙 Transcript</a>` : '';
    main.insertAdjacentHTML('beforeend', `
      <div class="latest-call-panel ${riskCls}">
        <div class="lc-header">
          <div class="lc-title">Latest Call — ${esc(latest.title || '')}</div>
          <div class="lc-meta">
            ${latest.date ? fmtDate(latest.date) : ''}
            ${latest.duration ? `· ${latest.duration} min` : ''}
            ${latest.owner ? `· ${esc(latest.owner)}` : ''}
            ${riskBadge}${typeBadge}${ffLink}
          </div>
        </div>
        <div class="lc-grid">
          <div class="lc-col">
            <div class="lc-col-label action">✔ Action Items</div>
            ${bulletList(latest.actionItems, 'lc-items', 'lc-empty')}
          </div>
          <div class="lc-col">
            <div class="lc-col-label blocker">⛔ Blockers</div>
            ${bulletList(latest.blockers, 'lc-items', 'lc-empty')}
          </div>
          <div class="lc-col">
            <div class="lc-col-label next">→ Next Steps</div>
            ${bulletList(latest.openQuestions, 'lc-items', 'lc-empty')}
          </div>
        </div>
      </div>`);
  } else {
    main.insertAdjacentHTML('beforeend', `<div class="no-latest-call">📭 No call briefs found for this client in the selected time window.</div>`);
  }

  // ── Zendesk tickets ──
  main.insertAdjacentHTML('beforeend', `<div class="section-title">Zendesk Tickets</div>`);
  const ticketCount = tickets.length;
  main.insertAdjacentHTML('beforeend', `
    <div class="tickets-panel">
      <div class="tickets-header">
        <h3>Open &amp; Pending Tickets</h3>
        <span class="ticket-count ${ticketCount ? 'has-tickets' : ''}">${ticketCount} ticket${ticketCount !== 1 ? 's' : ''}</span>
      </div>
      ${ticketCount ? `
        <div class="ticket-list">
          ${tickets.map(t => `
            <div class="ticket-row">
              <span class="ticket-id">#${t.id}</span>
              <span class="ticket-subject"><a href="${esc(t.url)}" target="_blank">${esc(t.subject)}</a></span>
              <span class="ticket-status ${t.status}">${t.status}</span>
              <span class="ticket-date">${t.updated || t.created || ''}</span>
            </div>
          `).join('')}
        </div>
      ` : `<div class="no-tickets">No open or pending tickets found.</div>`}
    </div>
  `);

  // ── Call history ──
  if (briefs.length > 0) {
    main.insertAdjacentHTML('beforeend', `<div class="section-title">Call History</div>`);
    const listEl = document.createElement('div');
    listEl.className = 'briefs-list';
    briefs.forEach(brief => listEl.appendChild(renderBriefCard(brief, false)));
    main.appendChild(listEl);
  }

  // ── Daily Digest ──
  main.insertAdjacentHTML('beforeend', `<div class="section-title">Daily Digest</div>`);
  main.appendChild(renderDigest(data.digest));
}

function bulletList(text, listCls, emptyCls) {
  const lines = parseBullets(text);
  if (!lines.length) return `<div class="${emptyCls}">—</div>`;
  return `<ul class="${listCls}">${lines.map(l => `<li>${fmtLine(l)}</li>`).join('')}</ul>`;
}

function generatePptx() {
  if (!activeClient || !lastBriefData) return;
  const btn = document.getElementById('pptxBtn');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '⏳ Generating…';

  try {
    const pptx = new PptxGenJS();
    const client  = activeClient;
    const { briefs = [], tickets = [] } = lastBriefData;
    const today = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

    // ── Palette ──────────────────────────────────────────────────────────────
    const BG    = '0f1117';
    const HDR   = '181c27';
    const ROW1  = '1e2436';
    const ROW2  = '181c27';
    const COLHDR= '242840';
    const ACCENT= '6c63ff';
    const TEAL  = '00d4aa';
    const TEXT  = 'e8e8f0';
    const MUTED = '8a90b0';
    const BORDER= '2a3050';
    const RED   = 'ff5a6e';
    const YEL   = 'f0a500';
    const GRN   = '00d4aa';
    const W = 13.33, H = 7.5;  // 16:9 widescreen

    pptx.layout  = 'LAYOUT_WIDE';
    pptx.author  = 'Alfred / Rev.io PM Hub';
    pptx.company = 'Rev.io';

    // ── Helpers ───────────────────────────────────────────────────────────────
    function bullets(text, max) {
      if (!text) return [];
      return text.split('\n')
        .map(l => l.replace(/^[•\-\*]\s*/, '').trim())
        .filter(Boolean).slice(0, max || 15);
    }
    function extractOwner(line) {
      const m = line.match(/\[([^\]]+)\]/);
      return m ? m[1] : '';
    }
    function stripOwner(line) {
      return line.replace(/\[[^\]]+\]/g, '').trim();
    }

    function addBg(slide) {
      slide.addShape(pptx.ShapeType.rect, { x:0, y:0, w:W, h:H, fill:{ color:BG } });
    }

    function addTopBar(slide, clientName, subtitle) {
      slide.addShape(pptx.ShapeType.rect, { x:0, y:0, w:W, h:0.55, fill:{ color:HDR } });
      slide.addShape(pptx.ShapeType.rect, { x:0, y:0.55, w:W, h:0.02, fill:{ color:ACCENT } });
      slide.addText([
        { text:'Rev.io  ', options:{ color:ACCENT, bold:true, fontSize:11 } },
        { text:'Onboarding Tracker  ·  ', options:{ color:MUTED, fontSize:11 } },
        { text: clientName, options:{ color:TEXT, bold:true, fontSize:11 } }
      ], { x:0.25, y:0.1, w:10, h:0.35 });
      slide.addText(subtitle, { x:10.5, y:0.12, w:2.7, h:0.3, fontSize:9, color:MUTED, align:'right' });
    }

    // Phase status bar at bottom of call slides
    const PHASES = ['Admin','Config','Data Load','CDR Dev','Comparative','Activation','1st Bill Out','Grad'];
    function addPhaseBar(slide, activationDate, gradDate) {
      const barY = H - 0.8, barH = 0.65;
      slide.addShape(pptx.ShapeType.rect, { x:0, y:barY-0.02, w:W, h:barH+0.04, fill:{color:HDR} });
      const pw = (W * 0.62) / PHASES.length;
      const today = new Date().toISOString().split('T')[0];
      const doneCount = activationDate && activationDate <= today ? 5 :
                        gradDate && gradDate <= today ? 8 : 3;
      PHASES.forEach((phase, i) => {
        const px = 0.2 + i * pw;
        const done = i < doneCount;
        const color = done ? TEAL : MUTED;
        slide.addShape(pptx.ShapeType.roundRect, {
          x: px, y: barY+0.06, w: pw-0.1, h: 0.5,
          fill:{ color: done ? TEAL+'22' : HDR },
          line:{ color, pt:1 }, rectRadius:0.03
        });
        slide.addText(phase, { x:px, y:barY+0.1, w:pw-0.1, h:0.42, fontSize:7.5, color, align:'center', valign:'middle', bold:done });
      });
      // Milestone dates on right
      const dates = [
        { label:'Activation', date: client.activationDate },
        { label:'1st Bill Out', date: client.billOutDate },
        { label:'Graduation', date: client.gradDate },
      ].filter(d => d.date);
      let dx = W * 0.64;
      dates.forEach(d => {
        const dc = d.date <= today ? TEAL : YEL;
        const df = new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        slide.addText(d.label, { x:dx, y:barY+0.06, w:1.4, h:0.22, fontSize:7, color:MUTED });
        slide.addText(df,      { x:dx, y:barY+0.26, w:1.4, h:0.28, fontSize:9, color:dc, bold:true });
        dx += 1.55;
      });
    }

    // Table of items
    function addItemsTable(slide, rows, startY, tableH) {
      const colW = [4.5, 1.4, 1.8, 1.2, 3.93];  // Component, Status/Due, Owner, ZD#, Notes
      const colX = [0.2];
      colW.forEach((w,i) => { if(i>0) colX.push(colX[i-1]+colW[i-1]); });
      const headers = ['Component','Status / Due','Owner','ZD #','Notes'];
      const rowH = 0.3;

      // Header row
      headers.forEach((h, ci) => {
        slide.addShape(pptx.ShapeType.rect, { x:colX[ci], y:startY, w:colW[ci]-0.02, h:rowH, fill:{color:COLHDR} });
        slide.addText(h, { x:colX[ci]+0.06, y:startY, w:colW[ci]-0.14, h:rowH, fontSize:8, bold:true, color:ACCENT, valign:'middle' });
      });

      // Data rows
      const maxRows = Math.floor((tableH - rowH) / rowH);
      rows.slice(0, maxRows).forEach((row, ri) => {
        const ry = startY + rowH + ri * rowH;
        const fill = ri % 2 === 0 ? ROW1 : ROW2;
        const isBlocker = row._type === 'blocker';
        const indicatorColor = isBlocker ? RED : (row.status === 'complete' ? GRN : YEL);

        headers.forEach((_, ci) => {
          slide.addShape(pptx.ShapeType.rect, { x:colX[ci], y:ry, w:colW[ci]-0.02, h:rowH, fill:{color:fill} });
        });
        // Colored left indicator on Component column
        slide.addShape(pptx.ShapeType.rect, { x:colX[0], y:ry, w:0.04, h:rowH, fill:{color:indicatorColor} });

        const cells = [row.component||'', row.status||'', row.owner||'', row.zd||'', row.notes||''];
        cells.forEach((val, ci) => {
          slide.addText(val, {
            x: colX[ci] + (ci===0?0.1:0.06), y: ry,
            w: colW[ci] - (ci===0?0.18:0.12), h: rowH,
            fontSize: 8, color: ci===0 ? TEXT : MUTED, valign:'middle', wrap:true
          });
        });
      });

      return startY + rowH + Math.min(rows.length, maxRows) * rowH;
    }

    // ── SLIDE 1: Master Overview ──────────────────────────────────────────────
    const s1 = pptx.addSlide();
    addBg(s1);
    addTopBar(s1, client.name, 'Master Overview  ·  ' + today);

    // Status + health + team
    const sg = client.statusGroup||'other';
    const statusColor = sg==='on-track' ? TEAL : sg==='off-track' ? RED : sg==='rts' ? YEL : MUTED;
    s1.addShape(pptx.ShapeType.roundRect, { x:0.2, y:0.7, w:1.5, h:0.26, fill:{color:statusColor+'22'}, line:{color:statusColor,pt:1}, rectRadius:0.03 });
    s1.addText(client.status||'Unknown', { x:0.2, y:0.7, w:1.5, h:0.26, fontSize:8.5, color:statusColor, bold:true, align:'center', valign:'middle' });

    if (client.health != null) {
      const hc = client.health>=70 ? TEAL : client.health>=40 ? YEL : RED;
      s1.addShape(pptx.ShapeType.roundRect, { x:1.85, y:0.7, w:0.85, h:0.26, fill:{color:hc+'22'}, line:{color:hc,pt:1}, rectRadius:0.03 });
      s1.addText(client.health+'/100', { x:1.85, y:0.7, w:0.85, h:0.26, fontSize:8.5, color:hc, bold:true, align:'center', valign:'middle' });
    }

    const team = [
      ...(client.sa||[]).map(n=>'SA: '+n),
      ...(client.pm||[]).map(n=>'PM: '+n),
      ...(client.de||[]).map(n=>'DE: '+n),
    ].join('   ·   ');
    s1.addText(team, { x:2.9, y:0.7, w:9.5, h:0.28, fontSize:9, color:MUTED, valign:'middle' });

    // Milestone timeline
    const mils = [
      { label:'Kickoff',      date:client.koDate },
      { label:'Charter',      date:client.charterDate },
      { label:'Activation',   date:client.activationDate },
      { label:'1st Bill Out', date:client.billOutDate },
      { label:'Graduation',   date:client.gradDate },
    ].filter(m=>m.date);
    const milY = 1.05, milH = 0.55;
    const mw = (W - 0.4) / Math.max(mils.length, 1);
    const todayStr = new Date().toISOString().split('T')[0];
    mils.forEach((m, i) => {
      const mx = 0.2 + i * mw;
      const dc = m.date <= todayStr ? TEAL : YEL;
      const df = new Date(m.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      s1.addShape(pptx.ShapeType.rect, { x:mx, y:milY, w:mw-0.1, h:milH, fill:{color:HDR}, line:{color:BORDER,pt:1} });
      if (i > 0) s1.addShape(pptx.ShapeType.line, { x:mx, y:milY+milH/2, w:-0.1, h:0, line:{color:dc+'66',pt:1} });
      s1.addShape(pptx.ShapeType.rect, { x:mx, y:milY, w:mw-0.1, h:0.03, fill:{color:dc} });
      s1.addText(m.label, { x:mx+0.08, y:milY+0.06, w:mw-0.26, h:0.2, fontSize:7.5, color:MUTED });
      s1.addText(df,       { x:mx+0.08, y:milY+0.26, w:mw-0.26, h:0.26, fontSize:10, color:dc, bold:true });
    });

    // Phase columns — 5 columns of deliverable items from call history
    const phases = ['Admin','Config & Training','Data Load','CDR Dev','Comparative'];
    const phaseY = 1.72, phaseH = H - phaseY - 0.15;
    const pw2 = (W - 0.4) / phases.length;
    // Aggregate unique action items across all briefs as "deliverables"
    const allActions = [];
    briefs.forEach(b => { bullets(b.actionItems,30).forEach(a => { if(!allActions.includes(a)) allActions.push(a); }); });
    const allBlockers = [];
    briefs.forEach(b => { bullets(b.blockers,20).forEach(a => { if(!allBlockers.includes(a)) allBlockers.push(a); }); });
    // ZD tickets as a phase
    const zdPhase = tickets.slice(0,8).map(t => t.subject);

    const phaseItems = [
      allActions.slice(0,6),
      allActions.slice(6,12),
      allActions.slice(12,18),
      allBlockers.slice(0,6),
      zdPhase,
    ];

    phases.forEach((phase, pi) => {
      const px = 0.2 + pi * pw2;
      s1.addShape(pptx.ShapeType.rect, { x:px, y:phaseY, w:pw2-0.08, h:phaseH, fill:{color:HDR}, line:{color:BORDER,pt:1} });
      s1.addShape(pptx.ShapeType.rect, { x:px, y:phaseY, w:pw2-0.08, h:0.28, fill:{color:COLHDR} });
      s1.addText(phase, { x:px+0.06, y:phaseY, w:pw2-0.2, h:0.28, fontSize:8.5, bold:true, color:ACCENT, valign:'middle' });
      const items = phaseItems[pi] || [];
      if (items.length) {
        s1.addText(
          items.map((item,ii) => ({ text:'› '+item+'\n', options:{color: ii%2===0?TEXT:MUTED, fontSize:7.5} })),
          { x:px+0.06, y:phaseY+0.32, w:pw2-0.18, h:phaseH-0.36, valign:'top', wrap:true, lineSpacingMultiple:1.4 }
        );
      } else {
        s1.addText('—', { x:px+0.06, y:phaseY+0.32, w:pw2-0.18, h:0.28, fontSize:8, color:MUTED });
      }
    });

    // ── SLIDE 2+: Weekly Call Slides ─────────────────────────────────────────
    briefs.slice(0, 8).forEach((brief, idx) => {
      const s = pptx.addSlide();
      addBg(s);

      const callDate = brief.date
        ? new Date(brief.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
        : '';
      addTopBar(s, client.name, (callDate || '') + (brief.owner ? '  ·  '+brief.owner : '') + (brief.callType ? '  ·  '+brief.callType : ''));

      // Risk banner if high/medium
      if (brief.risk === 'high' || brief.risk === 'medium') {
        const rc = brief.risk==='high' ? RED : YEL;
        s.addShape(pptx.ShapeType.rect, { x:0, y:0.57, w:W, h:0.22, fill:{color:rc+'18'} });
        s.addText((brief.risk==='high'?'🔴':'🟡')+' '+brief.risk.toUpperCase()+': '+(brief.riskReason||''), {
          x:0.25, y:0.59, w:W-0.5, h:0.18, fontSize:8, color:rc, bold:true
        });
      }

      const tableStart = (brief.risk && brief.risk !== 'low') ? 0.88 : 0.68;
      const tableEnd = H - 0.85;

      // Build rows: action items + blockers + ZD tickets
      const rows = [];
      bullets(brief.actionItems, 12).forEach(item => {
        rows.push({ component: stripOwner(item), status:'In Progress', owner:extractOwner(item)||brief.owner||'', zd:'', notes:'', _type:'action' });
      });
      bullets(brief.blockers, 6).forEach(item => {
        rows.push({ component: stripOwner(item), status:'Blocked', owner:extractOwner(item)||brief.owner||'', zd:'', notes:'', _type:'blocker' });
      });
      // Match ZD tickets to action items where possible
      tickets.slice(0,4).forEach(t => {
        const exists = rows.some(r => r.component.toLowerCase().includes(t.subject.toLowerCase().slice(0,15)));
        if (!exists && idx===0) {
          rows.push({ component:t.subject.slice(0,60), status:t.status, owner:'', zd:'#'+t.id, notes:'', _type:'zd' });
        }
      });

      addItemsTable(s, rows, tableStart, tableEnd - tableStart);
      addPhaseBar(s, client.activationDate, client.gradDate);
    });

    // ── Save ──────────────────────────────────────────────────────────────────
    const fileName = (client.name||'client').replace(/[^a-zA-Z0-9]/g,'-').replace(/-+/g,'-')
      + '-Tracker-' + new Date().toISOString().slice(0,10) + '.pptx';
    pptx.writeFile({ fileName });
    btn.disabled = false;
    btn.textContent = '▶ Generate Tracker';
  } catch(err) {
    console.error('PPTX error:', err);
    btn.disabled = false;
    btn.textContent = '⚠ Error — try again';
  }
}

function renderDigest(digest) {
  const el = document.createElement('div');
  el.className = 'digest-panel';

  if (!digest) {
    el.innerHTML = `<div class="no-digest">No digest available — digest is generated daily at 7:30 AM ET.</div>`;
    return el;
  }

  const asOfMatch = digest.statusLine.match(/As of ([\d\-T: UTC]+)/);
  const asOf = asOfMatch ? asOfMatch[1].trim() : '';

  const sections = [
    { label: 'Status',            items: renderDigestStatus(digest), always: true },
    { label: 'Team',              items: digest.team },
    { label: 'Timeline',          items: digest.timeline },
    { label: 'Recent Calls (7d)', items: digest.recentCalls },
    { label: 'Zendesk Tickets',   items: digest.zdTickets,   full: digest.zdTickets?.length > 4 },
    { label: 'Teams Notes',       items: digest.teamsNotes,  full: true },
  ].filter(s => s.always || (s.items && s.items.length));

  el.innerHTML = `
    <div class="digest-header">
      <h3>Daily Snapshot</h3>
      ${asOf ? `<span class="digest-as-of">As of ${asOf}</span>` : ''}
    </div>
    <div class="digest-grid">
      ${sections.map(s => digestSection(s.label, s.items, !!s.full)).join('')}
    </div>
  `;
  return el;
}

function renderDigestStatus(digest) {
  const lines = [];
  // Extract status and health label from the status line
  const statusMatch = digest.statusLine.match(/^([✅⚠🔴🟠🟡🟢]+\s*)(On Track|Off Track|At Risk|On Hold|RTS|Activated|Graduated)/i);
  if (statusMatch) lines.push(statusMatch[0].trim());
  if (digest.health != null) {
    lines.push(`Health Score: ${digest.health}/100${digest.healthLabel ? ' — ' + digest.healthLabel : ''}`);
  }
  // Also surface any score breakdown lines
  const raw = digest.raw?.['_top'] || [];
  raw.forEach(b => {
    if (/project:|calls:|blockers:|recency:/i.test(b.text)) lines.push(b.text);
  });
  return lines;
}

function digestSection(label, items, fullWidth) {
  const cls = fullWidth ? ' full' : '';
  const arr = Array.isArray(items) ? items : (items ? [items] : []);
  const content = arr.length
    ? `<ul>${arr.map(t => `<li>${esc(t)}</li>`).join('')}</ul>`
    : `<span class="empty">—</span>`;
  return `
    <div class="digest-section${cls}">
      <div class="ds-label">${label}</div>
      <div class="ds-content ${!arr.length ? 'empty' : ''}">${content}</div>
    </div>`;
}

function renderBriefCard(brief, autoOpen) {
  const card = document.createElement('div');
  card.className = 'brief-card' + (autoOpen ? ' open' : '');

  const riskBadge  = brief.risk    ? `<span class="badge risk-${brief.risk.toLowerCase()}">${brief.risk.toLowerCase()}</span>` : '';
  const typeBadge  = brief.callType? `<span class="badge type-${brief.callType}">${brief.callType}</span>` : '';
  const roleBadge  = brief.ownerRole ? `<span class="badge role-${brief.ownerRole}">${brief.ownerRole}</span>` : '';
  const riskBanner = (brief.risk === 'high' || brief.risk === 'medium') && brief.riskReason
    ? `<div class="risk-banner ${brief.risk === 'medium' ? 'medium' : ''}">⚠ ${esc(brief.riskReason)}</div>` : '';
  const ffLink = brief.firefliesId
    ? `<a class="ff-link" href="https://app.fireflies.ai/view/${esc(brief.firefliesId)}" target="_blank">🎙 Transcript</a>` : '';

  card.innerHTML = `
    <div class="brief-header">
      <span class="brief-date">${brief.date ? fmtDate(brief.date) : '—'}</span>
      <div class="brief-title-col">
        <div class="brief-title">${esc(brief.title || '')}</div>
        <div class="brief-badges">${typeBadge}${riskBadge}${roleBadge}</div>
      </div>
      <div class="brief-meta">
        ${brief.duration ? `<span class="brief-duration">${brief.duration} min</span>` : ''}
        ${brief.owner ? `<span class="brief-owner">${esc(brief.owner)}</span>` : ''}
        ${ffLink}
      </div>
      <span class="brief-chevron">▼</span>
    </div>
    ${riskBanner ? `<div class="brief-risk-banner-wrap">${riskBanner}</div>` : ''}
    <div class="brief-body">
      <div class="brief-sections">
        ${briefSection('✔ Action Items',   'action',   brief.actionItems)}
        ${briefSection('⛔ Blockers',       'blocker',  brief.blockers)}
        ${briefSection('? Open Questions', 'question', brief.openQuestions)}
        ${briefSection('⚑ Red Flags',      'flag',     brief.redFlags)}
        ${briefSection('↗ Key Takeaways',  'takeaway', brief.keyTakeaways, true)}
        ${brief.configTopics ? briefSection('⚙ Config Topics', 'config', brief.configTopics, true) : ''}
      </div>
    </div>
  `;

  card.querySelector('.brief-header').addEventListener('click', () => {
    card.classList.toggle('open');
  });

  return card;
}

function briefSection(label, cls, text, fullWidth) {
  const fwClass = fullWidth ? ' full-width' : '';
  const lines = parseBullets(text);
  const content = lines.length
    ? `<ul>${lines.map(l => `<li>${fmtLine(l)}</li>`).join('')}</ul>`
    : `<span class="empty">—</span>`;
  return `
    <div class="brief-section${fwClass}">
      <div class="bs-label ${cls}">${label}</div>
      <div class="bs-content ${!lines.length ? 'empty' : ''}">${content}</div>
    </div>`;
}

function parseBullets(text) {
  if (!text) return [];
  return text
    .split('\n')
    .map(l => l.replace(/^[•\-\*]\s*/, '').trim())
    .filter(Boolean);
}

function fmtLine(line) {
  // Highlight [Owner Name] tags
  return esc(line).replace(/\[([^\]]+)\]/g, '<span class="owner-tag">[$1]</span>');
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
